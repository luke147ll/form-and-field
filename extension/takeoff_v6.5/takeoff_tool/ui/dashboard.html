<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Form and Field — Takeoff Report</title>
<link rel="icon" type="image/png" href="../icons/scan_ufo_32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;background:#1e1e2e;color:#cdd6f4;overflow:hidden;display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#181825}::-webkit-scrollbar-thumb{background:#45475a;border-radius:4px}

/* HEADER */
.header{background:#181825;border-bottom:1px solid #313244;padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.header h1{font-size:13px;font-weight:700;color:#cba6f7;white-space:nowrap}
.hb{padding:3px 8px;border-radius:4px;border:1px solid #45475a;background:#313244;color:#cdd6f4;cursor:pointer;font-size:11px;white-space:nowrap;font-family:inherit}
.hb:hover{background:#45475a}.hb.pri{background:#cba6f7;color:#1e1e2e;border-color:#cba6f7;font-weight:600}
.hb.grn{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.hb.yel{background:#f9e2af;color:#1e1e2e;border-color:#f9e2af}
.hb:disabled{opacity:0.35;cursor:default;pointer-events:none}
.hb svg{width:16px;height:16px;vertical-align:middle}
.sep{width:1px;height:18px;background:#45475a}

/* SUMMARY */
.summary{background:#181825;border-bottom:1px solid #313244;padding:4px 12px;display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;font-size:11px}
.sb{display:flex;align-items:center;gap:4px}.sb b{color:#89b4fa}.sb .e{color:#f38ba8}

/* BULK BAR */
.bulk{padding:5px 10px;background:#2d2040;border-bottom:1px solid #cba6f7;display:none;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;font-size:11px}
.bulk.show{display:flex}
.bulk .cnt{color:#cba6f7;font-weight:600;margin-right:4px}
.bulk input,.bulk select{background:#313244;border:1px solid #45475a;color:#cdd6f4;font-size:11px;border-radius:3px;padding:2px 4px;font-family:inherit}
.bulk input[type=text]{width:70px}
.bulk select{max-width:130px}
.bulk label{color:#a6adc8}

/* MEASUREMENT PANEL */
#measPanel{display:none;background:#181825;border-bottom:1px solid #313244;flex-shrink:0;max-height:260px;overflow-y:auto}
#measPanel.show{display:block}
.mp-toolbar{padding:6px 12px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid #313244;background:#1a1a2e}
.mp-cat{padding:4px 12px 2px 12px;cursor:pointer;user-select:none}
.mp-cat-hdr{font-weight:600;font-size:11px;color:#a6e3a1;display:flex;align-items:center;gap:6px}
.mp-cat-hdr .arr{transition:transform .15s;display:inline-block;color:#a6adc8;font-size:8px;width:10px}
.mp-cat.closed .arr{transform:rotate(-90deg)}
.mp-cat.closed .mp-cat-items{display:none}
.mp-item{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 20px;font-size:11px}
.mp-item:hover{background:#222236}
.mp-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:1px solid #45475a}
.mp-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cdd6f4}
.mp-val{color:#89b4fa;font-weight:600;white-space:nowrap;min-width:60px;text-align:right}
.mp-del{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center}
.mp-del svg{stroke:#f38ba8;width:12px;height:12px}
.mp-del:hover svg{stroke:#ff6b8a}

/* FILTER BAR */
.fbar{padding:5px 10px;background:#181825;border-bottom:1px solid #313244;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.fbar input[type=text],.fbar select{background:#313244;border:1px solid #45475a;color:#cdd6f4;border-radius:3px;padding:2px 5px;font-size:11px;font-family:inherit}
.fbar input[type=text]{width:140px}.fbar select{max-width:140px}
.fbar label{font-size:11px;color:#a6adc8}
.fiso-btn{background:transparent;border:1px solid #45475a;border-radius:4px;color:#a6adc8;cursor:pointer;padding:2px 8px;display:flex;align-items:center;gap:4px;font-size:11px}
.fiso-btn:hover{border-color:#cba6f7;color:#cdd6f4}
.fiso-btn.active{background:#cba6f733;border-color:#cba6f7;color:#cba6f7}
.fbar2{padding:3px 10px 5px;background:#181825;border-bottom:1px solid #313244;display:none;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.fbar2.show{display:flex}
.fbar2 select{background:#313244;border:1px solid #45475a;color:#cdd6f4;border-radius:3px;padding:2px 5px;font-size:11px;font-family:inherit;max-width:160px}
.fbar2 label{font-size:11px;color:#a6adc8}
.clr-btn{background:none;border:1px solid #45475a;border-radius:3px;color:#f38ba8;cursor:pointer;padding:2px 7px;font-size:10px;font-family:inherit}
.clr-btn:hover{border-color:#f38ba8;background:#f38ba811}

/* MAIN SCROLLABLE */
.tp{flex:1;overflow:auto;padding:0}

/* CATEGORY GROUPS */
.cg{border-bottom:1px solid #252535;margin-bottom:1px}
.cg.iso-active{border-left:3px solid #cba6f7}
.cg.iso-dimmed{opacity:0.55}
.cgh{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:#1a1a2e;user-select:none;transition:background .15s}
.cgh:hover{background:#222236}
.cgh .arr{transition:transform .15s;display:inline-block;color:#a6adc8;font-size:9px;width:12px}
.cgh.closed .arr{transform:rotate(-90deg)}
.cgh .cname{font-weight:600;font-size:11px;border-radius:3px;padding:1px 7px;color:#1e1e2e;background:#7f849c}
.cgh .cinfo{color:#89b4fa;font-size:12px;font-weight:600;margin-left:auto;white-space:nowrap;min-width:90px;text-align:right}
/* Active/expanded category highlight */
.cg.open>.cgh{background:#252540;border-left:3px solid #cba6f7;padding-left:9px}
.cg.open>.cgb{background:#1c1c30}
.cg-toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 34px;background:#222240;border-bottom:1px solid #313244;font-size:11px}
.cg-toolbar .cact{display:flex;gap:4px;align-items:center;margin-left:auto}
.cgb{display:none}
.cg.open .cgb{display:block}

/* SUBCATEGORY HEADERS */
.sc-hdr{background:#20203a;cursor:pointer;user-select:none}
.sc-hdr td{padding:6px 8px 6px 28px !important;border-bottom:1px solid #2a2a42;border-left:2px solid #45475a}
.sc-hdr:hover td{background:#282848 !important}
.sc-hdr .arr{transition:transform .15s;display:inline-block;color:#a6adc8;font-size:8px;width:10px}
.sc-hdr.closed .arr{transform:rotate(-90deg)}
.sc-name{color:#cba6f7;font-weight:600;font-size:11px}
.sc-info{color:#6c7086;font-size:10px;margin-left:2px}
.sc-total{color:#89b4fa;font-size:11px;font-weight:600;margin-left:6px}
.sc-acts{display:inline-flex;gap:3px;align-items:center;margin-left:8px}
/* Dimmed "(no subcategory)" rows */
.sc-hdr.sc-none td{opacity:0.55}
.sc-hdr.sc-none .sc-name{color:#6c7086;font-style:italic}

/* ASSEMBLY PANEL */
#asmPanel{display:none;background:#181825;border-bottom:1px solid #313244;flex-shrink:0;max-height:280px;overflow-y:auto}
#asmPanel.show{display:block}
.asm-toolbar{padding:6px 12px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid #313244;background:#1a1a2e;align-items:center}
.asm-item{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;border-bottom:1px solid #252535;cursor:pointer}
.asm-item:hover{background:#222236}
.asm-item.active{background:#2d2040;border-left:3px solid #cba6f7;padding-left:9px}
.asm-name{font-weight:600;color:#cdd6f4;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asm-cnt{color:#89b4fa;font-weight:600;font-size:11px;min-width:30px;text-align:right}
.asm-date{color:#6c7086;font-size:10px;min-width:70px;text-align:right}
.asm-acts{display:flex;gap:3px;align-items:center}
.asm-acts button{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center;color:#a6adc8}
.asm-acts button:hover{color:#cdd6f4}
.asm-notes{color:#6c7086;font-size:10px;font-style:italic;margin-left:4px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asm-empty{padding:12px;color:#6c7086;font-size:11px;text-align:center;font-style:italic}

/* EYE TOGGLE */
.ey{background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;display:inline-flex;align-items:center}
.ey svg{stroke:#fff;width:14px;height:14px}
.ey:hover svg{stroke:#89b4fa}
.ey.off svg{stroke:#45475a}

/* ACTION BUTTONS */
.ab{padding:2px 7px;border-radius:3px;border:1px solid #45475a;background:#313244;color:#cdd6f4;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap}
.ab:hover{background:#45475a;border-color:#89b4fa}
.ib{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center;vertical-align:middle}
.ib svg{stroke:#888;transition:stroke 0.15s}
.ib:hover svg{stroke:#fff}
.ib.danger svg{stroke:#f38ba8}.ib.danger:hover svg{stroke:#ff6b8a}
.ib.accent:hover svg{stroke:#89b4fa}
.ib.warn svg{stroke:#f9e2af}.ib.warn:hover svg{stroke:#ffe566}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#262637;color:#a6adc8;padding:5px 8px;text-align:left;font-weight:600;border-bottom:1px solid #45475a;white-space:nowrap;font-size:10px;position:sticky;top:0;z-index:4}
td{padding:5px 8px;border-bottom:1px solid #222230;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#2a2a3e}
tr.sel td{background:#2d2050 !important}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.ck{width:20px;text-align:center;padding:1px}
td.ck input,th.ck input{cursor:pointer}
th.ck{width:20px;text-align:center;padding:1px}

/* INLINE EDITABLE */
select.cs{background:#313244;border:1px solid #45475a;color:#cdd6f4;font-size:10px;border-radius:3px;padding:1px 2px;max-width:110px;font-family:inherit}
select.cs-unit{background:#1e1e2e;border:1px solid #89b4fa;color:#89b4fa;font-size:11px;font-weight:600;border-radius:3px;padding:2px 6px;font-family:inherit;cursor:pointer}select.cs-unit:hover{background:#313244;border-color:#b4befe}select.cs-unit:focus{outline:none;border-color:#cba6f7;box-shadow:0 0 0 1px #cba6f7}
select.cs.fl{border-color:#fab387;background:#3e3020}
.sz{background:transparent;border:1px solid transparent;color:#cdd6f4;font-size:10px;padding:1px 3px;border-radius:3px;width:65px;font-family:inherit;cursor:pointer}
.sz:hover{border-color:#45475a}.sz:focus{border-color:#89b4fa;background:#313244;outline:none}

.cb{border-radius:3px;padding:1px 5px;font-size:10px;color:#1e1e2e;font-weight:600;background:#7f849c}
.tg{background:#45475a;border-radius:3px;padding:1px 5px;font-size:10px}
.wi{color:#f9e2af;cursor:help;font-weight:bold}
.fi{color:#fab387;cursor:help;font-weight:bold;margin-right:2px}

/* DEBUG */
#dbg{background:#11111b;border-top:1px solid #313244;max-height:80px;overflow:auto;padding:4px 8px;font-family:monospace;font-size:10px;color:#a6e3a1;flex-shrink:0;display:none}
#dbg.show{display:block}
#dbg div{border-bottom:1px solid #1e1e2e;padding:1px 0}
#dbg .err{color:#f38ba8}

/* SCAN DIALOG */
#scanBackdrop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:99}
#scanBackdrop.show{display:block}
#scanOverlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:440px;max-height:540px;background:#1e1e2e;border:1px solid #45475a;border-radius:10px;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,0.6);flex-direction:column;overflow:hidden}
#scanOverlay.show{display:flex}
#scanOverlay .so-hdr{padding:12px 16px;background:#262637;border-bottom:1px solid #45475a;display:flex;align-items:center;gap:8px}
#scanOverlay .so-hdr span{font-size:13px;font-weight:700;color:#cdd6f4}
/* Pre-scan form */
#scanOverlay .so-form{padding:16px;display:flex;flex-direction:column;gap:12px}
#scanOverlay .so-form .so-desc{font-size:11px;color:#a6adc8;line-height:1.4}
#scanOverlay .so-form .so-radio-group{display:flex;flex-direction:column;gap:6px}
#scanOverlay .so-form label{font-size:11px;color:#cdd6f4;display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border:1px solid #313244;border-radius:5px;background:#181825;transition:border-color 0.15s}
#scanOverlay .so-form label:hover{border-color:#45475a}
#scanOverlay .so-form label.active{border-color:#89b4fa;background:#1a1a2e}
#scanOverlay .so-form label.disabled{opacity:0.4;cursor:not-allowed}
#scanOverlay .so-form label .so-soon{margin-left:auto;font-size:9px;color:#6c7086;background:#313244;padding:1px 6px;border-radius:3px}
#scanOverlay .so-form input[type=radio]{accent-color:#89b4fa}
#scanOverlay .so-btns{display:flex;gap:8px;justify-content:flex-end;padding:0 16px 14px 16px}
/* Scanning state */
#scanOverlay .so-scanning{display:none;flex-direction:column;align-items:center;padding:8px 16px 8px 16px;gap:6px}
#scanOverlay .so-scanning.show{display:flex}
.scan-progress-wrap{width:100%;max-width:380px;height:4px;background:#313244;border-radius:2px;overflow:hidden}
.scan-progress-bar{height:100%;width:40%;background:linear-gradient(90deg,#cba6f7,#89b4fa);border-radius:2px;animation:scanSlide 1.5s ease-in-out infinite}
@keyframes scanSlide{0%{margin-left:-40%}100%{margin-left:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.so-scanning-text{font-size:12px;font-weight:600;color:#cdd6f4;animation:pulse 1.8s ease-in-out infinite}
/* Log area */
#scanOverlay .so-body{flex:1;overflow-y:auto;padding:4px 16px 8px 16px;font-family:monospace;font-size:10px;color:#a6adc8;max-height:140px;display:none}
#scanOverlay .so-body.show{display:block}
#scanOverlay .so-body div{padding:2px 0;border-bottom:1px solid #181825}
#scanOverlay .so-body .done{color:#a6e3a1}
#scanOverlay .so-body .warn{color:#f9e2af}
#scanOverlay .so-body .stat{color:#89b4fa}
/* Complete state */
#scanOverlay .so-done{display:none;flex-direction:column;align-items:center;padding:8px 16px 8px 16px;gap:8px}
#scanOverlay .so-done.show{display:flex}
.so-summary{font-size:11px;color:#a6adc8;text-align:center;line-height:1.5}

/* CATEGORY COLORS */
.c-Drywall{background:#f9e2af}.c-WallFraming{background:#fab387}.c-Walls{background:#f0c8a0}
.c-WallFinish{background:#f0dca0}.c-WallStructure{background:#dcaa78}.c-WallSheathing{background:#e6d2a0}
.c-MasonryVeneer{background:#d2b48c}.c-Siding{background:#8cc88c}.c-ExteriorFinish{background:#78be78}
.c-MetalRoofing{background:#8cb4dc}.c-ShingleRoofing{background:#a08cb4}.c-Roofing{background:#96aad2}
.c-RoofFraming{background:#c89664}.c-RoofSheathing{background:#e6c896}
.c-Concrete{background:#aaa}.c-Flooring{background:#beb496}
.c-StructuralLumber{background:#dca050}.c-Insulation{background:#ffb4dc}.c-Membrane{background:#c8c8ff}
.c-Windows{background:#64b4ff}.c-Doors{background:#a07850}
.c-Casework{background:#b4c88c}.c-Countertops{background:#c8b4a0}
.c-Ceilings{background:#a0c8e6}.c-Plumbing{background:#64c8c8}
.c-Hardware{background:#c8c8c8}.c-Trim{background:#b48cc8}.c-Fascia{background:#b4a0c8}
.c-Soffit{background:#c8b4dc}.c-GenericModels{background:#c8c8a0}.c-Uncategorized{background:#ff6464}
.c-Gutters{background:#8ca0b4}.c-Flashing{background:#b4b4dc}.c-Baseboard{background:#c8a088}
.c-CrownMold{background:#c8b0a0}.c-Casing{background:#b0a0c0}.c-Railing{background:#a0b0c0}
.c-DripEdge{background:#90b0a0}.c-Tile{background:#a0c8b4}.c-Backsplash{background:#b4c8c8}
.c-ShowerWalls{background:#90b8c8}.c-_IGNORE{background:#585b70;color:#a6adc8}

/* INPUT MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200}
.modal-bg.show{display:block}
.modal-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#313244;border:1px solid #45475a;border-radius:8px;padding:20px;z-index:201;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.modal-card h3{font-size:13px;font-weight:600;color:#cdd6f4;margin-bottom:12px}
.modal-card input[type=text]{width:100%;background:#1e1e2e;border:1px solid #45475a;color:#cdd6f4;border-radius:4px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box}
.modal-card input[type=text]:focus{border-color:#cba6f7}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}

/* CONTEXT MENU */
.ctx-menu{display:none;position:fixed;z-index:300;background:#313244;border:1px solid #45475a;border-radius:6px;padding:4px 0;box-shadow:0 4px 16px rgba(0,0,0,0.5);min-width:160px}
.ctx-menu.show{display:block}
.ctx-item{padding:6px 14px;font-size:11px;color:#cdd6f4;cursor:pointer;display:flex;align-items:center;gap:6px}
.ctx-item:hover{background:#45475a}
.ctx-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.ctx-sep{height:1px;background:#45475a;margin:3px 0}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Form and Field</h1><div class="sep"></div>
  <button class="hb pri" onclick="call('highlightAll')">Highlight All</button>
  <button class="hb" onclick="call('clearHighlights')">Clear</button>
  <button class="hb" onclick="hideMeasurements()" title="Hide all measurement highlights" style="color:#f38ba8">Hide Meas.</button>
  <button class="hb" onclick="call('showAll');resetVis()">Show All</button>
  <button class="hb" id="undoBtn" onclick="doUndo()" disabled title="Undo (Ctrl+Z)" style="display:inline-flex;align-items:center;gap:3px;padding:3px 6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Undo</button>
  <button class="hb grn" onclick="toggleMeasPanel()">Measurements</button>
  <button class="hb" onclick="toggleAsmPanel()" style="color:#f9e2af;border-color:#f9e2af">Assemblies</button>
  <button class="hb" onclick="promptNewCategory()" title="Add empty category">+ Category</button>
  <div class="sep"></div>
  <button class="hb" onclick="call('exportCSV')">CSV</button>
  <button class="hb pri" onclick="call('exportHTML')">Report</button>
  <button class="hb" onclick="showScanDialog()">Rescan</button>
  <div class="sep"></div>
  <button class="hb yel" onclick="call('activateLF')" title="Measure Linear Feet" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="5" x2="2" y2="11"/><line x1="14" y1="5" x2="14" y2="11"/><line x1="5" y1="7" x2="5" y2="9"/><line x1="8" y1="6" x2="8" y2="10"/><line x1="11" y1="7" x2="11" y2="9"/></svg></button>
  <button class="hb yel" onclick="call('activateSF')" title="Measure Square Feet" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" fill="currentColor" fill-opacity="0.15"/><line x1="2" y1="6" x2="4" y2="6"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/></svg></button>
  <button class="hb" onclick="call('activateElevation')" title="Place Elevation Tag" style="display:inline-flex;align-items:center;padding:3px 6px;color:#cba6f7;border-color:#cba6f7"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="14" x2="14" y2="14"/><line x1="8" y1="14" x2="8" y2="3"/><polyline points="5 6 8 3 11 6"/><line x1="3" y1="10" x2="13" y2="10" stroke-dasharray="2 2"/></svg></button>

function uLabel(m){
  if(m==='lf')return ICO_LF_SM;
  if(m==='sf'||m==='sf_cy'||m==='sf_sheets')return ICO_SF_SM;
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return' <span style="color:#a6adc8;font-size:10px">EA</span>';

}
/* Returns filtered unit options based on the category's default measurement type */
function unitOptionsFor(defMT){
  var opts;
  // Surface-based categories
  if(defMT==='sf'||defMT==='sf_cy'||defMT==='sf_sheets')
    opts=[['sf','SF'],['sf_cy','SF+CY'],['sf_sheets','SF+sht'],['ea','EA'],['lf','LF'],['volume','ft\u00B3']];
  // Linear categories
  else if(defMT==='lf')
    opts=[['lf','LF'],['ea','EA'],['sf','SF'],['volume','ft\u00B3']];
  // Count categories
  else if(defMT==='ea'||defMT==='ea_bf'||defMT==='ea_sf')
    opts=[['ea','EA'],['ea_bf','EA+BF'],['ea_sf','EA+SF'],['lf','LF'],['sf','SF'],['volume','ft\u00B3']];
  // Volume/default
  else
    opts=[['volume','ft\u00B3'],['sf_cy','SF+CY'],['ea','EA'],['sf','SF'],['lf','LF']];
  return opts;
}

function call(n,a){
  try{
    if(window.sketchup&&typeof window.sketchup[n]==='function'){if(a!==undefined)window.sketchup[n](a);else window.sketchup[n]();}
    else{if(a!==undefined)window.location='skp:'+n+'@'+a;else window.location='skp:'+n;}
  }catch(e){log('call ERR: '+n+' '+e.message,'err');}
}

function receiveData(json){
  try{
    var d=JSON.parse(json);
    D=d.rows||[];CA=d.categories||[];CO=d.costCodes||[];MSUB=d.masterSubcategories||{};CATMT=d.categoryMT||{};
    CA.sort(function(a,b){
      if(a==='_IGNORE')return 1;if(b==='_IGNORE')return -1;
      if(a==='Uncategorized')return 1;if(b==='Uncategorized')return -1;
      return a.localeCompare(b);
    });
    log('Loaded '+D.length+' rows');
    buildDD();buildBulkDDs();
    for(var i=0;i<D.length;i++){if(D[i].category==='Uncategorized'){openCats['Uncategorized']=true;break;}}
    syncIsolation();
    filt();
  }catch(e){
    log('PARSE: '+e.message,'err');
    document.getElementById('dp').innerHTML='<div style="padding:20px;color:#f38ba8">'+e.message+'</div>';
  }
}

function buildDD(){
  var ccM={},subM={},ccs=[],subs=[],i,r;
  var matM={},sizeM={},tagM={},etM={},fnM={};
  var mats=[],sizes=[],tags=[],ets=[],fns=[];
  // Category filter sourced from CA (master list), excluding _IGNORE
  var cats=[];
  for(i=0;i<CA.length;i++){if(CA[i]!=='_IGNORE')cats.push(CA[i]);}
  for(i=0;i<D.length;i++){
    r=D[i];if(r.category==='_IGNORE')continue;
    if(r.costCode&&!ccM[r.costCode]){ccM[r.costCode]=0;ccs.push(r.costCode);}
    if(r.costCode)ccM[r.costCode]++;
    if(r.subcategory&&!subM[r.subcategory]){subM[r.subcategory]=0;subs.push(r.subcategory);}
    if(r.subcategory)subM[r.subcategory]++;
    if(r.material&&!matM[r.material]){matM[r.material]=0;mats.push(r.material);}
    if(r.material)matM[r.material]++;
    if(r.sizeNominal&&!sizeM[r.sizeNominal]){sizeM[r.sizeNominal]=0;sizes.push(r.sizeNominal);}
    if(r.sizeNominal)sizeM[r.sizeNominal]++;
    if(r.tag&&!tagM[r.tag]){tagM[r.tag]=0;tags.push(r.tag);}
    if(r.tag)tagM[r.tag]++;
    if(r.elementType&&!etM[r.elementType]){etM[r.elementType]=0;ets.push(r.elementType);}
    if(r.elementType)etM[r.elementType]++;
    if(r.function&&!fnM[r.function]){fnM[r.function]=0;fns.push(r.function);}
    if(r.function)fnM[r.function]++;
  }
  // Merge master subcategories into sub filter
  for(var mk in MSUB){if(MSUB.hasOwnProperty(mk)){var ma=MSUB[mk];for(var mi=0;mi<ma.length;mi++){if(!subM[ma[mi]]){subM[ma[mi]]=0;subs.push(ma[mi]);}}}}
  cats.sort();ccs.sort();subs.sort();mats.sort();sizes.sort();tags.sort();ets.sort();fns.sort();
  var prevC=document.getElementById('fC').value;
  var prevCC=document.getElementById('fCC').value;
  var prevSub=document.getElementById('fSub').value;
  var h='<option value="">All</option>';
  for(i=0;i<cats.length;i++)h+='<option>'+X(cats[i])+'</option>';
  document.getElementById('fC').innerHTML=h;
  if(prevC)document.getElementById('fC').value=prevC;
  h='<option value="">All</option>';
  for(i=0;i<ccs.length;i++)h+='<option value="'+X(ccs[i])+'">'+X(ccs[i])+' ('+ccM[ccs[i]]+')</option>';
  document.getElementById('fCC').innerHTML=h;
  if(prevCC)document.getElementById('fCC').value=prevCC;
  h='<option value="">All</option>';
  for(i=0;i<subs.length;i++){var sc=subM[subs[i]];h+='<option value="'+X(subs[i])+'">'+X(subs[i])+(sc?' ('+sc+')':'')+'</option>';}
  document.getElementById('fSub').innerHTML=h;
  if(prevSub)document.getElementById('fSub').value=prevSub;
  // Attribute filter dropdowns
  buildAttrDD('fMat','fMatL',mats,matM,1);
  buildAttrDD('fSize','fSizeL',sizes,sizeM,1);
  buildAttrDD('fTag','fTagL',tags,tagM,2);
  buildAttrDD('fEt','fEtL',ets,etM,1);
  buildAttrDD('fFn','fFnL',fns,fnM,1);
  // Show second row only if any attribute filters have data
  var bar2=document.getElementById('fbar2');
  if(mats.length||sizes.length||tags.length>1||ets.length||fns.length){bar2.classList.add('show');}
  else{bar2.classList.remove('show');}
}
function buildAttrDD(selId,lblId,vals,counts,minVals){
  var sel=document.getElementById(selId),lbl=document.getElementById(lblId);
  if(!sel)return;
  var prev=sel.value;
  var need=minVals||1;
  if(vals.length<need){sel.style.display='none';lbl.style.display='none';sel.value='';return;}
  sel.style.display='';lbl.style.display='';
  var h='<option value="">All</option>';
  for(var i=0;i<vals.length;i++){var c=counts[vals[i]]||0;h+='<option value="'+X(vals[i])+'">'+X(vals[i])+' ('+c+')</option>';}
  sel.innerHTML=h;
  if(prev)sel.value=prev;
}
function buildBulkDDs(){
  var h='<option value="">--</option>';
  for(var i=0;i<CA.length;i++)h+='<option value="'+X(CA[i])+'">'+X(CA[i])+'</option>';
  h+='<option value="__custom__">+ Custom...</option>';
  document.getElementById('bulkCat').innerHTML=h;
  h='<option value="">--</option>';
  for(var i=0;i<CO.length;i++)h+='<option value="'+CO[i].code+'">'+X(CO[i].full)+'</option>';
  document.getElementById('bulkCC').innerHTML=h;
  // Bulk sub dropdown: union of all MSUB values
  var allSubs={},asList=[];
  for(var mk in MSUB){if(MSUB.hasOwnProperty(mk)){var ma=MSUB[mk];for(var mi=0;mi<ma.length;mi++){if(!allSubs[ma[mi]]){allSubs[ma[mi]]=1;asList.push(ma[mi]);}}}}
  asList.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  h='<option value="">--</option>';
  for(var si=0;si<asList.length;si++)h+='<option value="'+X(asList[si])+'">'+X(asList[si])+'</option>';
  h+='<option value="__custom_sub__">+ Custom...</option>';
  document.getElementById('bulkSub').innerHTML=h;
}

/* ═══ FILTER ═══ */
function filt(){
  var s=document.getElementById('fS').value.toLowerCase();
  var c=document.getElementById('fC').value;
  var fcc=document.getElementById('fCC').value;
  var fsub=document.getElementById('fSub').value;
  var fmat=document.getElementById('fMat').value;
  var fsize=document.getElementById('fSize').value;
  var ftag=document.getElementById('fTag').value;
  var fet=document.getElementById('fEt').value;
  var ffn=document.getElementById('fFn').value;
  var fasm=document.getElementById('fAsm').value;
  var asmIds=null;
  if(fasm&&ASMB[fasm]){asmIds={};var ai=ASMB[fasm].entity_ids||[];for(var ak=0;ak<ai.length;ak++)asmIds[ai[ak]]=true;}
  var i,r,x,tot=0;
  F=[];
  for(i=0;i<D.length;i++){
    r=D[i];
    if(r.category==='_IGNORE')continue;
    tot++;
    if(asmIds&&!asmIds[r.entityId])continue;
    if(c&&r.category!==c)continue;
    if(fcc&&r.costCode!==fcc)continue;
    if(fsub&&r.subcategory!==fsub)continue;
    if(fmat&&(r.material||'')!==fmat)continue;
    if(fsize&&(r.sizeNominal||'')!==fsize)continue;
    if(ftag&&(r.tag||'')!==ftag)continue;
    if(fet&&(r.elementType||'')!==fet)continue;
    if(ffn&&(r.function||'')!==ffn)continue;
    if(s){
      x=(r.definitionName||'')+' '+(r.material||'')+' '+(r.category||'')+' '+(r.costCode||'')+' '+(r.sizeNominal||'')+' '+(r.subcategory||'')+' '+(r.tag||'')+' '+(r.elementType||'')+' '+(r.function||'');
      if(x.toLowerCase().indexOf(s)===-1)continue;
    }
    F.push(r);
  }
  document.getElementById('fCnt').textContent=F.length+' / '+tot;
  strip();renderGroups();updateBulkBar();
  if(FISO)applyFilterIsolation();
  updateFisoBtn();
}

function strip(){
  var i,r,cats={},sol=0,unc=0,all=0;
  for(i=0;i<D.length;i++){r=D[i];if(r.category==='_IGNORE')continue;all++;cats[r.category]=1;if(r.category==='Uncategorized')unc++;}
  var h='<div class="sb"><b>'+all+'</b> items</div>';
  h+='<div class="sb"><b>'+Object.keys(cats).length+'</b> categories</div>';
  if(unc)h+='<div class="sb"><span class="e">'+unc+'</span> uncat</div>';
  document.getElementById('sstrip').innerHTML=h;
}

/* ═══ MEASUREMENTS ═══ */
function pv(r){
  var m=r.measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return(r.instanceCount||1)+uLabel(m);
  if(m==='lf'){var l=r.linearFt||0;return l>0?(l*(r.instanceCount||1)).toFixed(1)+uLabel(m):'--';}
  if(m==='sf'||m==='sf_cy'||m==='sf_sheets'){
    if(r.areaSF)return r.areaSF.toFixed(1)+uLabel(m);
    if(m==='sf_cy'&&r.volumeFt3)return(r.volumeFt3/27).toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>';
    return '--';
  }
  if(m==='volume')return r.volumeFt3?r.volumeFt3.toFixed(2)+uLabel(m):'--';
  return '--';
}
function sv2(r){
  var m=r.measurementType||'volume';
  if(m==='sf_cy')return r.volumeFt3?(r.volumeFt3/27).toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>':'';
  if(m==='ea_bf')return r.volumeBF?r.volumeBF.toFixed(1)+' <span style="color:#a6adc8;font-size:10px">BF</span>':'';
  if(m==='ea_sf'){var w=(r.bbWidth||0)/12,h2=(r.bbHeight||0)/12,a=w*h2*(r.instanceCount||1);return a>0?a.toFixed(1)+uLabel('sf'):'';}
  if(m==='sf_sheets'){return r.areaSF?Math.ceil(r.areaSF/32)+' <span style="color:#a6adc8;font-size:10px">sht</span>':'';}
  return '';
}
function pn(r){
  var m=r.measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return r.instanceCount||1;
  if(m==='lf')return(r.linearFt||0)*(r.instanceCount||1);
  if(m==='sf'||m==='sf_cy'||m==='sf_sheets')return r.areaSF||(m==='sf_cy'?(r.volumeFt3||0)/27:0);
  return r.volumeFt3||0;
}
function grpTotal(items){
  var tot=0,i,m;
  for(i=0;i<items.length;i++){
    var r=items[i]; m=r.measurementType||'volume';
    if(m==='ea'||m==='ea_bf'||m==='ea_sf')tot+=(r.instanceCount||1);
    else if(m==='lf')tot+=(r.linearFt||0)*(r.instanceCount||1);
    else if(m==='sf'||m==='sf_cy'||m==='sf_sheets')tot+=(r.areaSF||0);
    else tot+=(r.volumeFt3||0);
  }
  if(!items.length)return'';
  m=items[0].measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return tot+uLabel(m);
  if(m==='lf')return tot.toFixed(1)+uLabel(m);
  if(m==='sf_cy'){
    var cy=0;for(i=0;i<items.length;i++)cy+=(items[i].volumeFt3||0)/27;
    var parts=[];
    if(tot>0)parts.push(tot.toFixed(1)+uLabel(m));
    if(cy>0)parts.push(cy.toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>');
    return parts.join(' / ')||'--';
  }
  if(m==='sf'||m==='sf_sheets')return tot.toFixed(1)+uLabel(m);
  return tot.toFixed(2)+uLabel(m);
}

var FIDX=[];

function renderGroups(){
  var gBy=document.getElementById('gBy').value||'category';
  var groups={},order=[],i,r,key;
  for(i=0;i<F.length;i++){
    r=F[i];
    if(gBy==='category') key=r.category||'Uncategorized';
    else if(gBy==='costCode') key=r.costCode||'(no code)';
    else if(gBy==='subcategory') key=r.subcategory||'(none)';
    else if(gBy==='measurement'){
      if(r.elementType==='Manual Measurement'){var lbl=r.definitionName||r.category||'Custom';key=(r.function==='SF'?'SF: ':'LF: ')+lbl;}
      else key='Unmeasured';
    }

    items.sort(function(a,b){

      h+='<td style="white-space:nowrap">';
      h+='<button class="ib accent" onclick="call(\'isolateEntities\',\''+row.entityId+'\')" title="Isolate">'+ICO_ISO+'</button>';
      h+='<button class="ib accent" onclick="call(\'zoomToEntity\',\''+row.entityId+'\')" title="Zoom to">'+ICO_ZOOM+'</button>';
      h+='</td></tr>';
    }
    // Render empty subcategories from MSUB that have no items
    if(gBy==='category'&&MSUB[gk]){
      var usedSubs={};for(var usi=0;usi<items.length;usi++)usedSubs[items[usi].subcategory||'']=1;
      var msubs=MSUB[gk];
      for(var esi=0;esi<msubs.length;esi++){

    }
    h+='</tbody></table></div></div>';

/* ═══ GROUP CONTROLS ═══ */
function togCat(gi,gk){var el=document.getElementById('cg_'+gi);if(!el)return;var o=el.classList.contains('open');if(o){el.classList.remove('open');delete openCats[gk];el.querySelector('.cgh').classList.add('closed');}else{el.classList.add('open');openCats[gk]=true;el.querySelector('.cgh').classList.remove('closed');}}
function expandAll(){for(var i=0;i<F.length;i++){openCats[F[i].category]=true;var s=F[i].subcategory||'';if(s)openSubs[F[i].category+'|'+s]=true;}renderGroups();}
function collapseAll(){openCats={};openSubs={};renderGroups();}

/* ═══ SUBCATEGORY CONTROLS ═══ */
function togSub(sKey){openSubs[sKey]=!openSubs[sKey];renderGroups();}
function togSubVis(cat,sub){
  var anyVis=false,ids=[];
  for(var i=0;i<D.length;i++){if(D[i].category===cat&&(D[i].subcategory||'')===sub){if(VIS[D[i].entityId]!==false)anyVis=true;ids.push(D[i].entityId);}}
  for(var j=0;j<ids.length;j++)VIS[ids[j]]=!anyVis;
  if(ids.length)call(anyVis?'hideEntities':'showEntities',ids.join(','));renderGroups();
}
function isoSub(cat,sub){
  ISO_CATS=null;
  for(var i=0;i<D.length;i++){var m=(D[i].category===cat&&(D[i].subcategory||'')===sub);VIS[D[i].entityId]=m;}
  var ids=[];for(var j=0;j<D.length;j++){if(D[j].category===cat&&(D[j].subcategory||'')===sub)ids.push(D[j].entityId);}
  if(ids.length)call('isolateEntities',ids.join(','));renderGroups();
}
function zoomSub(cat,sub){
  var ids=[];for(var i=0;i<F.length;i++){if(F[i].category===cat&&(F[i].subcategory||'')===sub)ids.push(F[i].entityId);}
  if(ids.length)call('zoomToEntities',ids.join(','));
}
function selSubItems(cat,sub){
  for(var i=0;i<F.length;i++){if(F[i].category===cat&&(F[i].subcategory||'')===sub)SEL[F[i].entityId]=true;}
  syncCBs();updateBulkBar();hlSel();
}
function selSubAll(cat,sub,chk){
  for(var i=0;i<F.length;i++){if(F[i].category===cat&&(F[i].subcategory||'')===sub){if(chk)SEL[F[i].entityId]=true;else delete SEL[F[i].entityId];}}
  syncCBs();updateBulkBar();hlSel();
}

/* ═══ VISIBILITY ═══ */
function togCatVis(gk){
  ISO_CATS=null;FISO=false;updateFisoBtn();
  var gBy=document.getElementById('gBy').value||'category';
  var anyVis=false,ids=[];
  for(var i=0;i<D.length;i++){
    if(grpKey(D[i],gBy)===gk){ids.push(D[i].entityId);if(VIS[D[i].entityId]!==false)anyVis=true;}
  }
  for(var j=0;j<ids.length;j++)VIS[ids[j]]=!anyVis;
  if(ids.length) call(anyVis?'hideEntities':'showEntities',ids.join(','));
  filt();
}
function togItemVis(eid){
  ISO_CATS=null;FISO=false;updateFisoBtn();
  var vis=VIS[eid]!==false; VIS[eid]=!vis;
  call(vis?'hideEntities':'showEntities',''+eid);
  filt();
}
function isoCat(cat){
  ISO_CATS={};ISO_CATS[cat]=true;
  for(var i=0;i<D.length;i++) VIS[D[i].entityId]=(D[i].category===cat);
  call('isolateCategory',cat); filt();
}
function zoomCat(cat){
  var ids=[];for(var i=0;i<F.length;i++){if(F[i].category===cat)ids.push(F[i].entityId);}
  if(ids.length) call('zoomToEntities',ids.join(','));
}
function resetVis(){ISO_CATS=null;VIS={};FISO=false;updateFisoBtn();filt();}
function syncIsolation(){
  if(FISO){applyFilterIsolation();return;}
  if(!ISO_CATS)return;
  var toHide=[],toShow=[];
  for(var i=0;i<D.length;i++){
    var r=D[i],want=!!ISO_CATS[r.category],cur=VIS[r.entityId]!==false;
    VIS[r.entityId]=want;
    if(want&&!cur)toShow.push(r.entityId);
    else if(!want&&cur)toHide.push(r.entityId);
  }
  if(toHide.length)call('hideEntities',toHide.join(','));
  if(toShow.length)call('showEntities',toShow.join(','));
}

/* ═══ FILTER ISOLATION ═══ */
function togFilterIso(){
  FISO=!FISO;
  if(FISO){applyFilterIsolation();}
  else{call('showAll');resetVis();}
  updateFisoBtn();
}
function applyFilterIsolation(){
  if(!FISO)return;
  var ids=[];
  for(var i=0;i<F.length;i++)ids.push(F[i].entityId);
  for(var j=0;j<D.length;j++)VIS[D[j].entityId]=false;
  for(var k=0;k<ids.length;k++)VIS[ids[k]]=true;
  ISO_CATS=null;
  if(ids.length>0){call('isolateEntities',ids.join(','));}
  else{var allIds=[];for(var m=0;m<D.length;m++)allIds.push(D[m].entityId);if(allIds.length)call('hideEntities',allIds.join(','));}
  renderGroups();
}
function updateFisoBtn(){
  var btn=document.getElementById('fisoBtn');if(!btn)return;
  var lbl=document.getElementById('fisoLbl');
  if(FISO){btn.classList.add('active');btn.title='Showing '+F.length+' filtered items — click to show all';lbl.textContent=F.length;}
  else{btn.classList.remove('active');btn.title='Isolate filtered items in viewport';lbl.textContent='Isolate';}
}

        '<button onclick="event.stopPropagation();deleteAssemblyConfirm(\''+X(name).replace(/'/g,"\\'")+'\');" title="Delete" style="color:#f38ba8"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>'+

function buildAsmDD(){
  var sel=document.getElementById('fAsm'),lbl=document.getElementById('fAsmL');
  var keys=Object.keys(ASMB);
  if(!keys.length){sel.style.display='none';lbl.style.display='none';sel.value='';return;}
  sel.style.display='';lbl.style.display='';
  var prev=sel.value;
  keys.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
  var h='<option value="">All</option>';
  for(var i=0;i<keys.length;i++){var a=ASMB[keys[i]];h+='<option value="'+X(keys[i])+'">'+X(keys[i])+' ('+a.count+')</option>';}
  sel.innerHTML=h;
  if(prev)sel.value=prev;
}

/* ═══ SELECTION ═══ */
function ckClick(cb,ev){
  var vi=parseInt(cb.getAttribute('data-vi')),eid=cb.getAttribute('data-eid'),chk=cb.checked;
  if(ev.shiftKey&&lastCheckIdx>=0){
    var lo=Math.min(lastCheckIdx,vi),hi=Math.max(lastCheckIdx,vi);
    for(var i=lo;i<=hi;i++){var id=FIDX[i];if(id!==undefined){if(chk)SEL[id]=true;else delete SEL[id];}}
    syncCBs();
  }else{if(chk)SEL[eid]=true;else delete SEL[eid];var row=document.getElementById('r'+eid);if(row)row.className=chk?'sel':'';}
  lastCheckIdx=vi; updateBulkBar(); hlSel();
}
function syncCBs(){
  var cbs=document.querySelectorAll('td.ck input[type=checkbox]');
  for(var i=0;i<cbs.length;i++){var eid=cbs[i].getAttribute('data-eid'),s=!!SEL[eid];cbs[i].checked=s;var row=cbs[i].closest('tr');if(row)row.className=s?'sel':'';}
}
function selGrpItems(gk){
  var gBy=document.getElementById('gBy').value||'category';
  for(var i=0;i<F.length;i++){if(grpKey(F[i],gBy)===gk)SEL[F[i].entityId]=true;}
  syncCBs();updateBulkBar();hlSel();
}
function selGrpAll(gk,chk){
  var gBy=document.getElementById('gBy').value||'category';
  for(var i=0;i<F.length;i++){if(grpKey(F[i],gBy)===gk){if(chk)SEL[F[i].entityId]=true;else delete SEL[F[i].entityId];}}
  syncCBs();updateBulkBar();hlSel();
}
function clearSel(){SEL={};lastCheckIdx=-1;syncCBs();updateBulkBar();call('clearHighlights');}
function getSelIds(){var ids=[];for(var k in SEL)if(SEL.hasOwnProperty(k))ids.push(k);return ids;}
function updateBulkBar(){var n=getSelIds().length;document.getElementById('bulkBar').className=n>0?'bulk show':'bulk';document.getElementById('bulkCnt').textContent=n+' sel';}
function hlSel(){var ids=getSelIds();if(ids.length)call('highlightEntities',ids.join(','));else call('clearHighlights');}
function grpKey(r,gBy){
  if(gBy==='category')return r.category||'Uncategorized';
  if(gBy==='costCode')return r.costCode||'(no code)';
  if(gBy==='subcategory')return r.subcategory||'(none)';
  if(gBy==='measurement'){
    if(r.elementType==='Manual Measurement'){
      var lbl=r.definitionName||r.category||'Custom';
      return(r.function==='SF'?'SF: ':'LF: ')+lbl;
    }
    return 'Unmeasured';
  }
  return r.category||'Uncategorized';
}

var MEAS=[],openMeasCats={};
function toggleMeasPanel(){var p=document.getElementById('measPanel');if(p.classList.contains('show')){p.classList.remove('show');}else{p.classList.add('show');call('requestMeasurements');}}
function receiveMeasurements(json){
  try{MEAS=JSON.parse(json);}catch(e){MEAS=[];log('MEAS parse err: '+e.message,'err');}
  renderMeasPanel();
}
function renderMeasPanel(){
  var bycat={},order=[],i,m;
  for(i=0;i<MEAS.length;i++){
    m=MEAS[i];var c=m.category||'Custom';
    if(!bycat[c]){bycat[c]=[];order.push(c);}
    bycat[c].push(m);
  }
  order.sort();
  if(!MEAS.length){document.getElementById('measBody').innerHTML='<div style="padding:12px;color:#6c7086;font-size:11px;font-style:italic">No measurements yet. Use LF/SF tools to create measurements.</div>';return;}
  var h='';
  for(var gi=0;gi<order.length;gi++){
    var cat=order[gi],items=bycat[cat],isOpen=openMeasCats[cat]!==false;
    h+='<div class="mp-cat'+(isOpen?'':' closed')+'">';
    h+='<div class="mp-cat-hdr" onclick="togMeasCat(\''+X2(cat)+'\')">';
    h+='<span class="arr">&#9660;</span> '+X(cat)+' <span style="color:#6c7086;font-size:10px">('+items.length+')</span>';
    h+='</div>';
    h+='<div class="mp-cat-items">';
    for(var j=0;j<items.length;j++){
      var it=items[j],vis=!!it.visible;
      var sw=it.color?'background:rgba('+it.color[0]+','+it.color[1]+','+it.color[2]+',0.7)':'background:#7f849c';
      h+='<div class="mp-item">';
      h+='<button class="ey'+(vis?'':' off')+'" onclick="togMeasVis('+it.eid+','+(!vis)+')" title="'+(vis?'Hide':'Show')+'">'+(vis?ICO_EYE_OPEN:ICO_EYE_CLOSED)+'</button>';
      h+='<span class="mp-swatch" style="'+sw+'"></span>';
      var desc=it.type==='ELEV'?(it.label||('EL. '+it.value)):(X(it.type)+': '+(it.note?X(it.note):X(cat)));
      h+='<span class="mp-desc" title="'+X(it.note||'')+'">'+desc+'</span>';
      h+='<span class="mp-val">'+fmtMeasVal(it.value,it.unit)+'</span>';
      h+='<button class="mp-del" onclick="delMeas('+it.eid+')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';
      h+='</div>';
    }
    h+='</div></div>';
  }
  document.getElementById('measBody').innerHTML=h;
}
function fmtMeasVal(val,unit){
  if(!val&&val!==0)return'--';
  if(unit==='SF')return val.toFixed(1)+' SF';
  if(unit==='LF')return val.toFixed(1)+' LF';
  if(unit==='feet'){var ft=Math.floor(val),inc=Math.round(Math.abs(val-ft)*12);if(inc>=12){ft+=(val>=0?1:-1);inc=0;}return ft+"'-"+inc+'"';}
  if(unit==='meters')return val.toFixed(3)+' m';
  if(unit==='inches')return val.toFixed(1)+'"';
  return val.toFixed(1);
}
function togMeasCat(cat){openMeasCats[cat]=openMeasCats[cat]===false?true:false;renderMeasPanel();}
function togMeasVis(eid,show){callJSON('toggleMeasurement',{eid:eid,show:show});for(var i=0;i<MEAS.length;i++){if(MEAS[i].eid===eid){MEAS[i].visible=show;break;}}renderMeasPanel();}
function showAllMeas(){call('showAllMeasurements');}
function hideAllMeas(){call('hideAllMeasurements');}
function hideMeasurements(){call('hideAllMeasurements');}
function delMeas(eid){showConfirmModal('Delete this measurement? This cannot be undone.',function(){call('deleteMeasurement',''+eid);MEAS=MEAS.filter(function(m){return m.eid!==eid;});renderMeasPanel();});}

function bulkSetCat(){
  var v=document.getElementById('bulkCat').value;if(!v)return;
  if(v==='__custom__'){
    document.getElementById('bulkCat').value='';
    showInputModal('New category name',function(n){
      // Update CA locally first
      if(CA.indexOf(n)===-1){CA.push(n);CA.sort();}
      var ids=getSelIds();if(!ids.length)return;
      recordUndo(ids,'category',n);
      // Assign FIRST (queues bulkSetCategory callback in Ruby)
      callJSON('bulkSetCategory',{eids:ids,val:n});
      for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].category=n;}
      // Then persist new category (queues addCustomCategory → broadcast will include assignment)
      call('addCustomCategory',n);
      clearSel();buildDD();buildBulkDDs();filt();
    });
    return;
  }
  var ids=getSelIds();if(!ids.length)return;
  recordUndo(ids,'category',v);
  callJSON('bulkSetCategory',{eids:ids,val:v});
  for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].category=v;}
  clearSel();filt();
}

  var v=document.getElementById('bulkCC').value;if(!v)return;

  recordUndo(ids,'costCode',v);
  callJSON('bulkSetCostCode',{eids:ids,val:v});
  for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].costCode=v;}

function bulkSetSize(){

  callJSON('bulkSetSize',{eids:ids,val:v});
  for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].sizeNominal=v;}
  clearSel();filt();

function bulkSetSub(){
  var v=document.getElementById('bulkSub').value;if(!v)return;
  if(v==='__custom_sub__'){
    document.getElementById('bulkSub').value='';
    showInputModal('New subcategory name',function(n){
      var ids=getSelIds();if(!ids.length)return;
      // Update MSUB locally first for all affected categories
      var addedCats={};
      for(var i=0;i<D.length;i++){
        if(SEL[D[i].entityId]){
          var c=D[i].category;
          if(!MSUB[c])MSUB[c]=[];
          if(MSUB[c].indexOf(n)===-1){MSUB[c].push(n);MSUB[c].sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});}
          addedCats[c]=1;
        }
      }
      recordUndo(ids,'subcategory',n);
      // Assign FIRST (queues bulkSetSubcategory callback in Ruby)
      callJSON('bulkSetSubcategory',{eids:ids,val:n});
      for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].subcategory=n;}
      // Then persist new subcategories (queues addSubcategory → broadcast will include assignments)
      for(var cat in addedCats){if(addedCats.hasOwnProperty(cat))callJSON('addSubcategory',{cat:cat,name:n});}
      clearSel();buildDD();buildBulkDDs();filt();
    });
    return;
  }
  var ids=getSelIds();if(!ids.length)return;
  recordUndo(ids,'subcategory',v);
  callJSON('bulkSetSubcategory',{eids:ids,val:v});
  for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].subcategory=v;}
  clearSel();buildDD();filt();
}

/* ═══ RENAME CATEGORY ═══ */
function startCatRename(oldName,el){
  var sp=el;
  var w=sp.offsetWidth,bg=getComputedStyle(sp).backgroundColor,fg=getComputedStyle(sp).color;
  var inp=document.createElement('input');
  inp.type='text';inp.value=oldName;
  inp.style.cssText='font-size:11px;font-weight:600;border:1px solid #89b4fa;border-radius:3px;padding:1px 5px;outline:none;background:'+bg+';color:'+fg+';width:'+Math.max(w,60)+'px;font-family:inherit';
  inp.setAttribute('data-old',oldName);
  sp.parentNode.replaceChild(inp,sp);
  inp.focus();inp.select();
  var done=false;
  function commit(){if(done)return;done=true;var nv=inp.value.trim();if(nv&&nv!==oldName)commitCatRename(oldName,nv);else renderGroups();}
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){e.preventDefault();done=true;renderGroups();}});
}
function commitCatRename(oldName,newName){
  // Optimistic JS-side update
  for(var i=0;i<D.length;i++){if(D[i].category===oldName)D[i].category=newName;}
  var idx=CA.indexOf(oldName);
  if(idx!==-1)CA.splice(idx,1);
  if(CA.indexOf(newName)===-1)CA.push(newName);
  CA.sort();
  if(openCats[oldName]){openCats[newName]=true;delete openCats[oldName];}
  var oldPfx=oldName+'|';
  var subKeys=Object.keys(openSubs);
  for(var s=0;s<subKeys.length;s++){if(subKeys[s].indexOf(oldPfx)===0){var tail=subKeys[s].substring(oldPfx.length);openSubs[newName+'|'+tail]=openSubs[subKeys[s]];delete openSubs[subKeys[s]];}}
  // Cascade MSUB
  if(MSUB[oldName]){
    if(MSUB[newName]){var ex=MSUB[newName],ol=MSUB[oldName];for(var mi=0;mi<ol.length;mi++){if(ex.indexOf(ol[mi])===-1)ex.push(ol[mi]);}ex.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});}
    else{MSUB[newName]=MSUB[oldName];}
    delete MSUB[oldName];
  }
  buildBulkDDs();buildDD();filt();
  // Persist to Ruby (Ruby handles entity attrs atomically)
  callJSON('renameCategory',{oldName:oldName,newName:newName});
}

/* ═══ UNDO ═══ */
function getFieldVal(eid,field){for(var i=0;i<D.length;i++){if(String(D[i].entityId)===String(eid))return D[i][field]||'';}return '';}
function recordUndo(ids,field,newVal){
  var ch=[];for(var j=0;j<ids.length;j++){var old=getFieldVal(ids[j],field);if(old!==newVal)ch.push({eid:ids[j],field:field,oldVal:old,newVal:newVal});}
  if(ch.length){UNDO.push(ch);if(UNDO.length>UNDO_MAX)UNDO.shift();updateUndoBtn();}
}
function updateUndoBtn(){var b=document.getElementById('undoBtn');if(b)b.disabled=!UNDO.length;}
function doUndo(){
  if(!UNDO.length)return;
  var ch=UNDO.pop(),needFilt=false,needDD=false;
  for(var c=0;c<ch.length;c++){
    var x=ch[c],eid=x.eid,f=x.field,val=x.oldVal;
    for(var i=0;i<D.length;i++){if(String(D[i].entityId)===String(eid)){D[i][f]=val;break;}}
    if(f==='category'){callJSON('setCategory',{eid:eid,val:val});needFilt=true;}
    else if(f==='costCode')callJSON('setCostCode',{eid:eid,val:val});
    else if(f==='subcategory'){callJSON('setSubcategory',{eid:eid,val:val});needDD=true;}
    else if(f==='sizeNominal')callJSON('setSize',{eid:eid,val:val});
    needFilt=true;
  }
  if(needDD)buildDD();
  if(needFilt)filt();
  updateUndoBtn();
}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}});

/* ═══ INLINE EDIT ═══ */
function doSetCat(eid,v){
  if(v==='__custom__'){
    // Revert dropdown to current category while modal is open
    var curCat='';
    for(var i=0;i<D.length;i++){if(D[i].entityId==eid){curCat=D[i].category;break;}}
    var row=document.getElementById('r'+eid);
    if(row){var dd=row.querySelector('select.cs');if(dd)dd.value=curCat;}
    showInputModal('New category name',function(n){
      // Update CA locally first
      if(CA.indexOf(n)===-1){CA.push(n);CA.sort();}
      // Assign FIRST (queues setCategory/bulkSetCategory callback in Ruby)
      applySetCat(eid,n);
      // Then persist new category (queues addCustomCategory → broadcast will include assignment)
      call('addCustomCategory',n);
      buildDD();buildBulkDDs();filt();
    });
    return;
  }
  applySetCat(eid,v);
}
function applySetCat(eid,v){
  var ids=(SEL[eid]&&getSelIds().length>1)?getSelIds():[String(eid)];
  recordUndo(ids,'category',v);
  if(ids.length>1){callJSON('bulkSetCategory',{eids:ids,val:v});}
  else{callJSON('setCategory',{eid:eid,val:v});}
  for(var i=0;i<D.length;i++){if(ids.length>1?SEL[D[i].entityId]:D[i].entityId==eid)D[i].category=v;}
  for(var j=0;j<ids.length;j++){
    var row=document.getElementById('r'+ids[j]);
    if(row){var dd=row.querySelector('select.cs');if(dd)dd.value=v;
      row.style.background='#2d4a2d';(function(r){setTimeout(function(){r.style.background='';},1500);})(row);}
  }
}
function doSetCC(eid,v){
  var ids=(SEL[eid]&&getSelIds().length>1)?getSelIds():[String(eid)];
  recordUndo(ids,'costCode',v);
  if(ids.length>1){callJSON('bulkSetCostCode',{eids:ids,val:v});}
  else{callJSON('setCostCode',{eid:eid,val:v});}

function doSetSize(el){var eid=el.getAttribute('data-eid'),v=el.value.trim();recordUndo([eid],'sizeNominal',v);callJSON('setSize',{eid:eid,val:v});for(var i=0;i<D.length;i++){if(D[i].entityId==eid){D[i].sizeNominal=v;break;}}}

function setMT(cat,mt){
  for(var i=0;i<D.length;i++){if(D[i].category===cat)D[i].measurementType=mt;}
  if(CATMT[cat])CATMT[cat].mt=mt;
  callJSON('setMeasurementType',{cat:cat,mt:mt});filt();
  // Activate measurement tool when SF or LF unit is selected
  if(mt==='sf'||mt==='sf_cy'||mt==='sf_sheets'||mt==='ea_sf')call('activateSFForCat',cat);
  else if(mt==='lf'||mt==='ea_bf')call('activateLFForCat',cat);
}

function scrollToEntity(eid){
  for(var i=0;i<F.length;i++){if(F[i].entityId==eid){openCats[F[i].category]=true;break;}}
  renderGroups();
  var row=document.getElementById('r'+eid);if(!row)return;
  row.scrollIntoView({behavior:'smooth',block:'center'});
  row.style.background='#2d4a2d';setTimeout(function(){row.style.background='';},3000);
}

function X(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function X2(s){return s?String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"):'';}
function T(s,n){return s&&s.length>n?s.substr(0,n)+'...':s||'';}

/* ═══ INPUT MODAL ═══ */
var _modalCb=null;
function showInputModal(title,cb,defaultVal){
  _modalCb=cb;
  document.getElementById('modalTitle').textContent=title;
  var inp=document.getElementById('modalInput');inp.value=defaultVal||'';
  document.getElementById('inputModal').className='modal-bg show';
  setTimeout(function(){inp.focus();inp.select();},50);
}
function confirmModal(){
  var v=document.getElementById('modalInput').value.trim();
  document.getElementById('inputModal').className='modal-bg';
  if(v&&_modalCb)_modalCb(v);
  _modalCb=null;
}
function cancelModal(){
  document.getElementById('inputModal').className='modal-bg';
  _modalCb=null;
}
function addNewCategory(n){
  if(CA.indexOf(n)===-1){CA.push(n);CA.sort();}
  call('addCustomCategory',n);
  buildDD();buildBulkDDs();
}

/* ═══ ADD / DELETE CATEGORY ═══ */
function promptNewCategory(){
  console.log('promptNewCategory called');
  showInputModal('New category name',function(name){
    console.log('promptNewCategory OK: '+name);
    if(!name)return;
    if(CA.indexOf(name)===-1){CA.push(name);CA.sort();}
    call('addEmptyCategory',name);
    buildDD();buildBulkDDs();filt();
  });
}
function deleteCat(cat){
  if(cat==='Uncategorized'||cat==='_IGNORE')return;
  var cnt=0;for(var i=0;i<D.length;i++){if(D[i].category===cat)cnt++;}
  var msg=cnt>0?'Delete "'+cat+'" and move '+cnt+' item'+(cnt>1?'s':'')+' to Uncategorized?':'Delete empty category "'+cat+'"?';
  showConfirmModal(msg,function(){
    // Optimistic update
    for(var i=0;i<D.length;i++){if(D[i].category===cat)D[i].category='Uncategorized';}
    var idx=CA.indexOf(cat);if(idx!==-1)CA.splice(idx,1);
    delete openCats[cat];
    delete MSUB[cat];
    // Clean openSubs
    var pfx=cat+'|';var sks=Object.keys(openSubs);for(var s=0;s<sks.length;s++){if(sks[s].indexOf(pfx)===0)delete openSubs[sks[s]];}
    buildDD();buildBulkDDs();filt();
    call('deleteCategory',cat);
  });
}

/* ═══ SUBCATEGORY MANAGEMENT ═══ */
function promptAddSubcategory(cat){
  showInputModal('New subcategory for '+cat,function(name){
    if(!name)return;
    if(!MSUB[cat])MSUB[cat]=[];
    if(MSUB[cat].indexOf(name)===-1){MSUB[cat].push(name);MSUB[cat].sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});}
    callJSON('addSubcategory',{cat:cat,name:name});
    buildDD();buildBulkDDs();filt();
  });
}
function startSubRename(cat,oldSub,el){
  showInputModal('Rename subcategory "'+oldSub+'"',function(nv){
    if(nv&&nv!==oldSub)commitSubRename(cat,oldSub,nv);
  },oldSub);
}
function commitSubRename(cat,oldSub,newSub){
  // Optimistic JS-side update
  for(var i=0;i<D.length;i++){if(D[i].category===cat&&D[i].subcategory===oldSub)D[i].subcategory=newSub;}
  if(MSUB[cat]){
    var idx=MSUB[cat].indexOf(oldSub);
    if(idx!==-1){
      if(MSUB[cat].indexOf(newSub)===-1){MSUB[cat][idx]=newSub;MSUB[cat].sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});}
      else{MSUB[cat].splice(idx,1);}
    }
  }
  // Fix openSubs key
  var oldKey=cat+'|'+oldSub,newKey=cat+'|'+newSub;
  if(openSubs[oldKey]){openSubs[newKey]=true;delete openSubs[oldKey];}
  buildDD();buildBulkDDs();filt();
  callJSON('renameSubcategory',{cat:cat,oldName:oldSub,newName:newSub});
}
function deleteSubcategory(cat,sub){
  var cnt=0;for(var i=0;i<D.length;i++){if(D[i].category===cat&&D[i].subcategory===sub)cnt++;}
  var msg=cnt>0?'Delete "'+sub+'" and clear subcategory on '+cnt+' item'+(cnt>1?'s':'')+'?':'Delete empty subcategory "'+sub+'"?';
  showConfirmModal(msg,function(){
    for(var i=0;i<D.length;i++){if(D[i].category===cat&&D[i].subcategory===sub)D[i].subcategory='';}
    if(MSUB[cat]){var idx=MSUB[cat].indexOf(sub);if(idx!==-1)MSUB[cat].splice(idx,1);}
    delete openSubs[cat+'|'+sub];
    buildDD();buildBulkDDs();filt();
    callJSON('deleteSubcategory',{cat:cat,name:sub});
  });
}

/* ═══ CONTEXT MENU ═══ */
var _ctxData=null;
function showCtxMenu(x,y,items){
  var m=document.getElementById('ctxMenu');
  var h='';
  for(var i=0;i<items.length;i++){
    if(items[i].sep){h+='<div class="ctx-sep"></div>';continue;}
    h+='<div class="ctx-item" onclick="hideCtxMenu();('+items[i].fn+')()">'+(items[i].icon||'')+items[i].label+'</div>';
  }
  m.innerHTML=h;
  m.style.left=Math.min(x,window.innerWidth-180)+'px';
  m.style.top=Math.min(y,window.innerHeight-items.length*30-10)+'px';
  m.classList.add('show');
}
function hideCtxMenu(){document.getElementById('ctxMenu').classList.remove('show');}
document.addEventListener('click',function(){hideCtxMenu();});
document.addEventListener('contextmenu',function(e){hideCtxMenu();});

function onSubHdrContext(e,cat,sub){
  if(!sub)return;
  e.preventDefault();e.stopPropagation();
  _ctxData={cat:cat,sub:sub};
  var ico='<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  var delIco='<svg viewBox="0 0 24 24" style="stroke:#f38ba8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  showCtxMenu(e.clientX,e.clientY,[
    {label:'Rename Subcategory',icon:ico,fn:'renameSubModal'},
    {sep:true},
    {label:'Delete Subcategory',icon:delIco,fn:'deleteSubCtx'}
  ]);
}
function renameSubModal(){
  if(!_ctxData)return;
  var cat=_ctxData.cat,sub=_ctxData.sub;
  showInputModal('Rename subcategory "'+sub+'"',function(nv){
    if(nv&&nv!==sub)commitSubRename(cat,sub,nv);
  },sub);
}
function deleteSubCtx(){
  if(!_ctxData)return;
  deleteSubcategory(_ctxData.cat,_ctxData.sub);
}

function onSubSelContext(e,sel){
  var eid=sel.getAttribute('data-eid'),curSub=sel.value;
  if(!curSub||curSub==='__custom_sub__')return;
  e.preventDefault();
  var cat='';
  for(var i=0;i<D.length;i++){if(String(D[i].entityId)===String(eid)){cat=D[i].category;break;}}
  if(!cat)return;
  _ctxData={cat:cat,sub:curSub,eid:eid};
  var ico='<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  showCtxMenu(e.clientX,e.clientY,[
    {label:'Rename "'+curSub+'"',icon:ico,fn:'renameSubModal'}
  ]);
}

/* ═══ CONFIRM MODAL ═══ */
var _confirmCb=null;
function showConfirmModal(msg,cb){
  _confirmCb=cb;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmModal').className='modal-bg show';
}
function doConfirm(){
  document.getElementById('confirmModal').className='modal-bg';
  if(_confirmCb)_confirmCb();
  _confirmCb=null;
}
function cancelConfirm(){
  document.getElementById('confirmModal').className='modal-bg';
  _confirmCb=null;
}

window.onload=function(){log('init');setTimeout(function(){call('requestData');},200);};
</script>

  <div class="modal-card">
    <h3 id="modalTitle">Enter name</h3>

    <div class="modal-btns">
      <button class="hb" onclick="cancelModal()">Cancel</button>
      <button class="hb pri" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>

  <div class="modal-card">
    <h3 style="color:#f38ba8">Confirm Delete</h3>
    <p id="confirmMsg" style="font-size:12px;color:#cdd6f4;line-height:1.5;margin-bottom:4px"></p>
    <div class="modal-btns">
      <button class="hb" onclick="cancelConfirm()">Cancel</button>
      <button class="hb" onclick="doConfirm()" style="background:#f38ba8;color:#1e1e2e;border-color:#f38ba8;font-weight:600">Delete</button>
    </div>
  </div>
</div>
<div id="ctxMenu" class="ctx-menu"></div>
</body>
