<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Form and Field — Takeoff Report</title>
<link rel="icon" type="image/png" href="../icons/scan_ufo_32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;background:#1e1e2e;color:#cdd6f4;overflow:hidden;display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#181825}::-webkit-scrollbar-thumb{background:#45475a;border-radius:4px}

/* HEADER */
.header{background:#181825;border-bottom:1px solid #313244;padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.header h1{font-size:13px;font-weight:700;color:#cba6f7;white-space:nowrap}
.hb{padding:3px 8px;border-radius:4px;border:1px solid #45475a;background:#313244;color:#cdd6f4;cursor:pointer;font-size:11px;white-space:nowrap;font-family:inherit}
.hb:hover{background:#45475a}.hb.pri{background:#cba6f7;color:#1e1e2e;border-color:#cba6f7;font-weight:600}
.hb.grn{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.hb.yel{background:#f9e2af;color:#1e1e2e;border-color:#f9e2af}
.hb:disabled{opacity:0.35;cursor:default;pointer-events:none}
.hb svg{width:16px;height:16px;vertical-align:middle}
.sep{width:1px;height:18px;background:#45475a}

/* SUMMARY */
.summary{background:#181825;border-bottom:1px solid #313244;padding:4px 12px;display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;font-size:11px}
.sb{display:flex;align-items:center;gap:4px}.sb b{color:#89b4fa}.sb .e{color:#f38ba8}

/* BULK BAR */
.bulk{padding:5px 10px;background:#2d2040;border-bottom:1px solid #cba6f7;display:none;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;font-size:11px}
.bulk.show{display:flex}
.bulk .cnt{color:#cba6f7;font-weight:600;margin-right:4px}
.bulk input,.bulk select{background:#313244;border:1px solid #45475a;color:#cdd6f4;font-size:11px;border-radius:3px;padding:2px 4px;font-family:inherit}
.bulk input[type=text]{width:70px}
.bulk select{max-width:130px}
.bulk label{color:#a6adc8}

/* MULTI-ISOLATE PANEL */
#catPanel{display:none;background:#181825;border-bottom:1px solid #313244;padding:6px 12px;flex-shrink:0;max-height:180px;overflow-y:auto}
#catPanel.show{display:block}
.cpRow{display:inline-flex;align-items:center;gap:4px;margin:2px 8px 2px 0;font-size:11px;cursor:pointer}
.cpRow:hover{color:#cdd6f4}
.cpRow input{cursor:pointer}
.cpBtn{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}

/* FILTER BAR */
.fbar{padding:5px 10px;background:#181825;border-bottom:1px solid #313244;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.fbar input[type=text],.fbar select{background:#313244;border:1px solid #45475a;color:#cdd6f4;border-radius:3px;padding:2px 5px;font-size:11px;font-family:inherit}
.fbar input[type=text]{width:140px}.fbar select{max-width:140px}
.fbar label{font-size:11px;color:#a6adc8}

/* MAIN SCROLLABLE */
.tp{flex:1;overflow:auto;padding:0}

/* CATEGORY GROUPS */
.cg{border-bottom:1px solid #252535;margin-bottom:1px}
.cgh{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:#1a1a2e;user-select:none}
.cgh:hover{background:#222236}
.cgh .arr{transition:transform .15s;display:inline-block;color:#a6adc8;font-size:9px;width:12px}
.cgh.closed .arr{transform:rotate(-90deg)}
.cgh .cname{font-weight:600;font-size:11px;border-radius:3px;padding:1px 7px;color:#1e1e2e;background:#7f849c}
.cgh .cinfo{color:#89b4fa;font-size:12px;font-weight:600;margin-left:auto;white-space:nowrap;min-width:90px;text-align:right}
.cg-toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 34px;background:#222236;border-bottom:1px solid #313244;font-size:11px}
.cg-toolbar .cact{display:flex;gap:4px;align-items:center;margin-left:auto}
.cgb{display:none}
.cg.open .cgb{display:block}

/* SUBCATEGORY HEADERS */
.sc-hdr{background:#1e1e32;cursor:pointer;user-select:none}
.sc-hdr td{padding:5px 8px !important;border-bottom:1px solid #2a2a3e}
.sc-hdr:hover td{background:#252540 !important}
.sc-hdr .arr{transition:transform .15s;display:inline-block;color:#a6adc8;font-size:8px;width:10px}
.sc-hdr.closed .arr{transform:rotate(-90deg)}
.sc-name{color:#a6adc8;font-weight:600;font-size:11px}
.sc-info{color:#6c7086;font-size:10px;margin-left:2px}
.sc-total{color:#89b4fa;font-size:11px;font-weight:600;margin-left:6px}
.sc-acts{display:inline-flex;gap:3px;align-items:center;margin-left:8px}

/* EYE TOGGLE */
.ey{background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;display:inline-flex;align-items:center}
.ey svg{stroke:#fff;width:14px;height:14px}
.ey:hover svg{stroke:#89b4fa}
.ey.off svg{stroke:#45475a}

/* ACTION BUTTONS */
.ab{padding:2px 7px;border-radius:3px;border:1px solid #45475a;background:#313244;color:#cdd6f4;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap}
.ab:hover{background:#45475a;border-color:#89b4fa}
.ib{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center;vertical-align:middle}
.ib svg{stroke:#888;transition:stroke 0.15s}
.ib:hover svg{stroke:#fff}
.ib.danger svg{stroke:#f38ba8}.ib.danger:hover svg{stroke:#ff6b8a}
.ib.accent:hover svg{stroke:#89b4fa}
.ib.warn svg{stroke:#f9e2af}.ib.warn:hover svg{stroke:#ffe566}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#262637;color:#a6adc8;padding:5px 8px;text-align:left;font-weight:600;border-bottom:1px solid #45475a;white-space:nowrap;font-size:10px;position:sticky;top:0;z-index:4}
td{padding:5px 8px;border-bottom:1px solid #222230;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#2a2a3e}
tr.sel td{background:#2d2050 !important}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.ck{width:20px;text-align:center;padding:1px}
td.ck input,th.ck input{cursor:pointer}
th.ck{width:20px;text-align:center;padding:1px}

/* INLINE EDITABLE */
select.cs{background:#313244;border:1px solid #45475a;color:#cdd6f4;font-size:10px;border-radius:3px;padding:1px 2px;max-width:110px;font-family:inherit}
select.cs.fl{border-color:#fab387;background:#3e3020}
.sz{background:transparent;border:1px solid transparent;color:#cdd6f4;font-size:10px;padding:1px 3px;border-radius:3px;width:65px;font-family:inherit;cursor:pointer}
.sz:hover{border-color:#45475a}.sz:focus{border-color:#89b4fa;background:#313244;outline:none}

.cb{border-radius:3px;padding:1px 5px;font-size:10px;color:#1e1e2e;font-weight:600;background:#7f849c}
.tg{background:#45475a;border-radius:3px;padding:1px 5px;font-size:10px}
.wi{color:#f9e2af;cursor:help;font-weight:bold}
.fi{color:#fab387;cursor:help;font-weight:bold;margin-right:2px}

/* DEBUG */
#dbg{background:#11111b;border-top:1px solid #313244;max-height:80px;overflow:auto;padding:4px 8px;font-family:monospace;font-size:10px;color:#a6e3a1;flex-shrink:0;display:none}
#dbg.show{display:block}
#dbg div{border-bottom:1px solid #1e1e2e;padding:1px 0}
#dbg .err{color:#f38ba8}

/* SCAN DIALOG */
#scanBackdrop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:99}
#scanBackdrop.show{display:block}
#scanOverlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:440px;max-height:540px;background:#1e1e2e;border:1px solid #45475a;border-radius:10px;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,0.6);flex-direction:column;overflow:hidden}
#scanOverlay.show{display:flex}
#scanOverlay .so-hdr{padding:12px 16px;background:#262637;border-bottom:1px solid #45475a;display:flex;align-items:center;gap:8px}
#scanOverlay .so-hdr span{font-size:13px;font-weight:700;color:#cdd6f4}
/* Pre-scan form */
#scanOverlay .so-form{padding:16px;display:flex;flex-direction:column;gap:12px}
#scanOverlay .so-form .so-desc{font-size:11px;color:#a6adc8;line-height:1.4}
#scanOverlay .so-form .so-radio-group{display:flex;flex-direction:column;gap:6px}
#scanOverlay .so-form label{font-size:11px;color:#cdd6f4;display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border:1px solid #313244;border-radius:5px;background:#181825;transition:border-color 0.15s}
#scanOverlay .so-form label:hover{border-color:#45475a}
#scanOverlay .so-form label.active{border-color:#89b4fa;background:#1a1a2e}
#scanOverlay .so-form label.disabled{opacity:0.4;cursor:not-allowed}
#scanOverlay .so-form label .so-soon{margin-left:auto;font-size:9px;color:#6c7086;background:#313244;padding:1px 6px;border-radius:3px}
#scanOverlay .so-form input[type=radio]{accent-color:#89b4fa}
#scanOverlay .so-btns{display:flex;gap:8px;justify-content:flex-end;padding:0 16px 14px 16px}
/* Scanning state */
#scanOverlay .so-scanning{display:none;flex-direction:column;align-items:center;padding:8px 16px 8px 16px;gap:6px}
#scanOverlay .so-scanning.show{display:flex}
.scan-progress-wrap{width:100%;max-width:380px;height:4px;background:#313244;border-radius:2px;overflow:hidden}
.scan-progress-bar{height:100%;width:40%;background:linear-gradient(90deg,#cba6f7,#89b4fa);border-radius:2px;animation:scanSlide 1.5s ease-in-out infinite}
@keyframes scanSlide{0%{margin-left:-40%}100%{margin-left:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.so-scanning-text{font-size:12px;font-weight:600;color:#cdd6f4;animation:pulse 1.8s ease-in-out infinite}
/* Log area */
#scanOverlay .so-body{flex:1;overflow-y:auto;padding:4px 16px 8px 16px;font-family:monospace;font-size:10px;color:#a6adc8;max-height:140px;display:none}
#scanOverlay .so-body.show{display:block}
#scanOverlay .so-body div{padding:2px 0;border-bottom:1px solid #181825}
#scanOverlay .so-body .done{color:#a6e3a1}
#scanOverlay .so-body .warn{color:#f9e2af}
#scanOverlay .so-body .stat{color:#89b4fa}
/* Complete state */
#scanOverlay .so-done{display:none;flex-direction:column;align-items:center;padding:8px 16px 8px 16px;gap:8px}
#scanOverlay .so-done.show{display:flex}
.so-summary{font-size:11px;color:#a6adc8;text-align:center;line-height:1.5}

/* CATEGORY COLORS */
.c-Drywall{background:#f9e2af}.c-WallFraming{background:#fab387}.c-Walls{background:#f0c8a0}
.c-WallFinish{background:#f0dca0}.c-WallStructure{background:#dcaa78}.c-WallSheathing{background:#e6d2a0}
.c-MasonryVeneer{background:#d2b48c}.c-Siding{background:#8cc88c}.c-ExteriorFinish{background:#78be78}
.c-MetalRoofing{background:#8cb4dc}.c-ShingleRoofing{background:#a08cb4}.c-Roofing{background:#96aad2}
.c-RoofFraming{background:#c89664}.c-RoofSheathing{background:#e6c896}
.c-Concrete{background:#aaa}.c-Flooring{background:#beb496}
.c-StructuralLumber{background:#dca050}.c-Insulation{background:#ffb4dc}.c-Membrane{background:#c8c8ff}
.c-Windows{background:#64b4ff}.c-Doors{background:#a07850}
.c-Casework{background:#b4c88c}.c-Countertops{background:#c8b4a0}
.c-Ceilings{background:#a0c8e6}.c-Plumbing{background:#64c8c8}
.c-Hardware{background:#c8c8c8}.c-Trim{background:#b48cc8}.c-Fascia{background:#b4a0c8}
.c-Soffit{background:#c8b4dc}.c-GenericModels{background:#c8c8a0}.c-Uncategorized{background:#ff6464}
.c-Gutters{background:#8ca0b4}.c-Flashing{background:#b4b4dc}.c-Baseboard{background:#c8a088}
.c-CrownMold{background:#c8b0a0}.c-Casing{background:#b0a0c0}.c-Railing{background:#a0b0c0}
.c-DripEdge{background:#90b0a0}.c-Tile{background:#a0c8b4}.c-Backsplash{background:#b4c8c8}
.c-ShowerWalls{background:#90b8c8}.c-_IGNORE{background:#585b70;color:#a6adc8}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Form and Field</h1><div class="sep"></div>
  <button class="hb pri" onclick="call('highlightAll')">Highlight All</button>
  <button class="hb" onclick="call('clearHighlights')">Clear</button>
  <button class="hb" onclick="call('clearMeasurementHighlights')" title="Clear SF face colors and hide LF ribbons" style="color:#f38ba8">Clear Paint</button>
  <button class="hb" onclick="call('showAll');resetVis()">Show All</button>
  <button class="hb" id="undoBtn" onclick="doUndo()" disabled title="Undo (Ctrl+Z)" style="display:inline-flex;align-items:center;gap:3px;padding:3px 6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Undo</button>
  <button class="hb grn" onclick="toggleCatPanel()">Multi-Isolate</button>
  <div class="sep"></div>
  <button class="hb" onclick="call('exportCSV')">CSV</button>
  <button class="hb pri" onclick="call('exportHTML')">Report</button>
  <button class="hb" onclick="showScanDialog()">Rescan</button>
  <div class="sep"></div>
  <button class="hb yel" onclick="call('activateLF')" title="Measure Linear Feet" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="5" x2="2" y2="11"/><line x1="14" y1="5" x2="14" y2="11"/><line x1="5" y1="7" x2="5" y2="9"/><line x1="8" y1="6" x2="8" y2="10"/><line x1="11" y1="7" x2="11" y2="9"/></svg></button>
  <button class="hb yel" onclick="call('activateSF')" title="Measure Square Feet" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" fill="currentColor" fill-opacity="0.15"/><line x1="2" y1="6" x2="4" y2="6"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/></svg></button>
  <button class="hb pri" onclick="call('openHyperParse')" title="Hyper Parse - Group and re-categorize visible entities" style="display:inline-flex;align-items:center;gap:3px;padding:3px 6px"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#cba6f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/><line x1="4.5" y1="5.5" x2="8.5" y2="5.5" stroke-width="1.2"/><line x1="5" y1="7.5" x2="8" y2="7.5" stroke-width="1.2"/></svg>Hyper Parse</button>
  <div class="sep"></div>
  <button class="hb" onclick="expandAll()" title="Expand all" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
  <button class="hb" onclick="collapseAll()" title="Collapse all" style="display:inline-flex;align-items:center;padding:3px 6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg></button>
  <button class="hb" onclick="toggleDebug()" title="Debug" style="margin-left:auto;font-size:10px;color:#a6e3a1">dbg</button>
</div>

<!-- SUMMARY STRIP -->
<div class="summary" id="sstrip"></div>

<!-- MULTI-ISOLATE PANEL -->
<div id="catPanel">
  <div id="catChecks"></div>
  <div class="cpBtn">
    <button class="hb grn" onclick="doMultiIsolate()">Isolate</button>
    <button class="hb" onclick="doMultiHide()" style="color:#f38ba8;border-color:#f38ba8">Hide</button>
    <button class="hb pri" onclick="doMultiHighlight()">Highlight</button>
    <button class="hb" onclick="cpAll(true)">All</button>
    <button class="hb" onclick="cpAll(false)">None</button>
    <button class="hb" onclick="toggleCatPanel()">Close</button>
  </div>
</div>

<!-- BULK EDIT BAR -->
<div class="bulk" id="bulkBar">
  <span class="cnt" id="bulkCnt">0</span>
  <label>Cat:</label><select id="bulkCat"></select><button class="hb pri" onclick="bulkSetCat()">Set</button>
  <label>Code:</label><select id="bulkCC"></select><button class="hb pri" onclick="bulkSetCC()">Set</button>
  <label>Size:</label><input type="text" id="bulkSize" placeholder="1x6" onkeydown="if(event.key==='Enter')bulkSetSize()">
  <label>Sub:</label><input type="text" id="bulkSub" placeholder="Guest Bath" onkeydown="if(event.key==='Enter')bulkSetSub()">
  <div class="sep"></div>
  <button class="hb" onclick="bulkExclude()" style="color:#f38ba8">Exclude</button>
  <button class="hb" onclick="clearSel()">Deselect</button>
</div>

<!-- FILTER BAR -->
<div class="fbar">
  <button onclick="call('showAll');resetVis()" title="Reset Visibility (Show All)" style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c7086" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
  <input type="text" id="fS" oninput="filt()" placeholder="Search...">
  <label>Category:</label><select id="fC" onchange="fCatChange(this)"><option value="">All</option></select>
  <label>Code:</label><select id="fCC" onchange="filt()"><option value="">All</option></select>
  <label>Sub:</label><select id="fSub" onchange="fSubChange(this)"><option value="">All</option></select>
  <div class="sep"></div>
  <label>Group:</label><select id="gBy" onchange="filt()" style="background:#313244;border:1px solid #45475a;color:#cdd6f4;border-radius:3px;padding:2px 4px;font-size:11px;font-family:inherit">
    <option value="category">Category</option>
    <option value="costCode">Cost Code</option>
    <option value="subcategory">Subcategory</option>
  </select>
  <span id="fCnt" style="margin-left:auto;color:#a6adc8;font-size:11px"></span>
</div>

<!-- MAIN CONTENT -->
<div class="tp" id="dp"></div>
<div id="dbg"></div>

<!-- SCAN DIALOG -->
<div id="scanBackdrop"></div>
<div id="scanOverlay">
  <div class="so-hdr"><span id="scanTitle">Scan Model</span></div>
  <!-- Phase 1: Pre-scan form -->
  <div class="so-form" id="scanForm">
    <div class="so-desc">Analyze model geometry and extract quantities.</div>
    <div class="so-radio-group">
      <label class="active" onclick="scanRadio(this)"><input type="radio" name="scanSrc" value="sketchup" checked> SketchUp Model</label>
      <label class="disabled"><input type="radio" name="scanSrc" value="ifc" disabled> IFC Import <span class="so-soon">Coming Soon</span></label>
      <label class="disabled"><input type="radio" name="scanSrc" value="revit" disabled> Revit Import <span class="so-soon">Coming Soon</span></label>
    </div>
  </div>
  <!-- Phase 2: Scanning -->
  <div class="so-scanning" id="scanProgress">
    <svg viewBox="0 0 400 170" width="380" height="160" style="display:block;margin:0 auto;">
      <circle cx="45" cy="12" r="1" fill="#6c7086" opacity="0.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="120" cy="28" r="0.8" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="200" cy="8" r="1.2" fill="#6c7086" opacity="0.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="280" cy="20" r="0.7" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="340" cy="10" r="1" fill="#6c7086" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="45" r="0.6" fill="#6c7086" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="38" r="0.9" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.3s" repeatCount="indefinite"/></circle>

function showScanDialog(){

}
function scanRadio(lbl){
  var labels=document.querySelectorAll('#scanForm .so-radio-group label:not(.disabled)');
  for(var i=0;i<labels.length;i++)labels[i].className='';

function doScan(){
  document.getElementById('scanForm').style.display='none';
  document.getElementById('scanBtns').innerHTML='';
  document.getElementById('scanProgress').className='so-scanning show';
  document.getElementById('scanLog').className='so-body show';

function scanStart(){
  if(!document.getElementById('scanOverlay').classList.contains('show')){
    document.getElementById('scanForm').style.display='none';
    document.getElementById('scanBtns').innerHTML='';
    document.getElementById('scanProgress').className='so-scanning show';
    document.getElementById('scanLog').className='so-body show';

    document.getElementById('scanTitle').textContent='Scanning...';
    document.getElementById('scanBackdrop').className='show';
    document.getElementById('scanOverlay').className='show';

function scanMsg(m,cls){
  var lb=document.getElementById('scanLog'),d=document.createElement('div');

function call(n,a){
  try{
    if(window.sketchup&&typeof window.sketchup[n]==='function'){if(a!==undefined)window.sketchup[n](a);else window.sketchup[n]();}
    else{if(a!==undefined)window.location='skp:'+n+'@'+a;else window.location='skp:'+n;}
  }catch(e){log('call ERR: '+n+' '+e.message,'err');}
}
function callJSON(n,o){call(n,JSON.stringify(o));}

/* ═══ DATA ═══ */
function receiveData(json){
  try{
    var d=JSON.parse(json);
    D=d.rows||[];CA=d.categories||[];CO=d.costCodes||[];
    CA.sort(function(a,b){
      if(a==='_IGNORE')return 1;if(b==='_IGNORE')return -1;
      if(a==='Uncategorized')return 1;if(b==='Uncategorized')return -1;
      return a.localeCompare(b);
    });
    log('Loaded '+D.length+' rows');
    buildDD();buildCatPanel();buildBulkDDs();
    for(var i=0;i<D.length;i++){if(D[i].category==='Uncategorized'){openCats['Uncategorized']=true;break;}}
    filt();
  }catch(e){
    log('PARSE: '+e.message,'err');
    document.getElementById('dp').innerHTML='<div style="padding:20px;color:#f38ba8">'+e.message+'</div>';
  }
}

function buildDD(){
  var catM={},ccM={},subM={},cats=[],ccs=[],subs=[],i,r;
  for(i=0;i<D.length;i++){
    r=D[i];
    if(r.category&&r.category!=='_IGNORE'&&!catM[r.category]){catM[r.category]=1;cats.push(r.category);}
    if(r.costCode&&!ccM[r.costCode]){ccM[r.costCode]=1;ccs.push(r.costCode);}
    if(r.subcategory&&!subM[r.subcategory]){subM[r.subcategory]=1;subs.push(r.subcategory);}
  }
  cats.sort();ccs.sort();subs.sort();
  var h='<option value="">All</option>';
  for(i=0;i<cats.length;i++)h+='<option>'+X(cats[i])+'</option>';
  h+='<option value="__addcat__">+ Add new category</option>';
  document.getElementById('fC').innerHTML=h;
  h='<option value="">All</option>';
  for(i=0;i<ccs.length;i++)h+='<option>'+X(ccs[i])+'</option>';
  document.getElementById('fCC').innerHTML=h;
  h='<option value="">All</option>';
  for(i=0;i<subs.length;i++)h+='<option>'+X(subs[i])+'</option>';
  h+='<option value="__addsub__">+ Add new subcategory</option>';
  document.getElementById('fSub').innerHTML=h;
}
function buildCatPanel(){
  var cm={},cats=[],i,r;
  for(i=0;i<D.length;i++){r=D[i];if(r.category&&r.category!=='_IGNORE'){if(!cm[r.category]){cm[r.category]=0;cats.push(r.category);}cm[r.category]++;}}
  cats.sort();
  var h='';
  for(i=0;i<cats.length;i++) h+='<label class="cpRow"><input type="checkbox" value="'+X(cats[i])+'" class="cpCk"> '+catBadge(cats[i])+' ('+cm[cats[i]]+')</label>';
  document.getElementById('catChecks').innerHTML=h;
}
function buildBulkDDs(){
  var h='<option value="">--</option>';
  for(var i=0;i<CA.length;i++)h+='<option value="'+X(CA[i])+'">'+X(CA[i])+'</option>';
  h+='<option value="__custom__">+ Custom...</option>';
  document.getElementById('bulkCat').innerHTML=h;
  h='<option value="">--</option>';
  for(var i=0;i<CO.length;i++)h+='<option value="'+CO[i].code+'">'+X(CO[i].full)+'</option>';
  document.getElementById('bulkCC').innerHTML=h;
}
function fCatChange(sel){
  if(sel.value==='__addcat__'){
    var n=prompt('New category name:');
    if(n&&n.trim()){n=n.trim();if(CA.indexOf(n)===-1){CA.push(n);CA.sort();}buildDD();buildBulkDDs();sel.value=n;}
    else{sel.value='';} filt();
  }else{filt();}
}
function fSubChange(sel){
  if(sel.value==='__addsub__'){
    var n=prompt('New subcategory name:');
    if(n&&n.trim()){n=n.trim();buildDD();sel.value=n;}
    else{sel.value='';} filt();
  }else{filt();}
}

var KNOWN_CATS={'Drywall':1,'WallFraming':1,'Walls':1,'WallFinish':1,'WallStructure':1,'WallSheathing':1,
'MasonryVeneer':1,'Siding':1,'ExteriorFinish':1,'MetalRoofing':1,'ShingleRoofing':1,'Roofing':1,
'RoofFraming':1,'RoofSheathing':1,'Concrete':1,'Flooring':1,'StructuralLumber':1,'Insulation':1,
'Membrane':1,'Windows':1,'Doors':1,'Casework':1,'Countertops':1,'Ceilings':1,'Plumbing':1,
'Hardware':1,'Trim':1,'Fascia':1,'Soffit':1,'GenericModels':1,'Uncategorized':1,
'Gutters':1,'Flashing':1,'Baseboard':1,'CrownMold':1,'Casing':1,'Railing':1,
'DripEdge':1,'Tile':1,'Backsplash':1,'ShowerWalls':1,'_IGNORE':1};

function catBadge(c){
  var cls=c.replace(/[\s\/]+/g,'');
  if(KNOWN_CATS[cls]) return '<span class="cb c-'+cls+'">'+X(c)+'</span>';
  var h=0;for(var i=0;i<c.length;i++)h=c.charCodeAt(i)+((h<<5)-h);

}
function catNameSpan(c){

/* ═══ FILTER ═══ */
function filt(){
  var s=document.getElementById('fS').value.toLowerCase();
  var c=document.getElementById('fC').value;
  var fcc=document.getElementById('fCC').value;
  var fsub=document.getElementById('fSub').value;
  var i,r,x,tot=0;
  F=[];
  for(i=0;i<D.length;i++){
    r=D[i];
    if(r.category==='_IGNORE')continue;
    tot++;
    if(c&&r.category!==c)continue;
    if(fcc&&r.costCode!==fcc)continue;
    if(fsub&&r.subcategory!==fsub)continue;
    if(s){
      x=(r.definitionName||'')+' '+(r.material||'')+' '+(r.category||'')+' '+(r.costCode||'')+' '+(r.sizeNominal||'')+' '+(r.subcategory||'');
      if(x.toLowerCase().indexOf(s)===-1)continue;
    }
    F.push(r);
  }
  document.getElementById('fCnt').textContent=F.length+' / '+tot;
  strip();renderGroups();updateBulkBar();
}

function strip(){
  var i,r,cats={},sol=0,unc=0,all=0;
  for(i=0;i<D.length;i++){r=D[i];if(r.category==='_IGNORE')continue;all++;cats[r.category]=1;if(r.category==='Uncategorized')unc++;}
  var h='<div class="sb"><b>'+all+'</b> items</div>';

  document.getElementById('sstrip').innerHTML=h;
}

/* ═══ MEASUREMENTS ═══ */
function pv(r){
  var m=r.measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return(r.instanceCount||1)+uLabel(m);
  if(m==='lf'){var l=r.linearFt||0;return l>0?(l*(r.instanceCount||1)).toFixed(1)+uLabel(m):'--';}
  if(m==='sf'||m==='sf_cy'||m==='sf_sheets'){
    if(r.areaSF)return r.areaSF.toFixed(1)+uLabel(m);
    if(m==='sf_cy'&&r.volumeFt3)return(r.volumeFt3/27).toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>';
    return '--';
  }
  if(m==='volume')return r.volumeFt3?r.volumeFt3.toFixed(2)+uLabel(m):'--';
  return '--';
}
function sv2(r){
  var m=r.measurementType||'volume';
  if(m==='sf_cy')return r.volumeFt3?(r.volumeFt3/27).toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>':'';
  if(m==='ea_bf')return r.volumeBF?r.volumeBF.toFixed(1)+' <span style="color:#a6adc8;font-size:10px">BF</span>':'';
  if(m==='ea_sf'){var w=(r.bbWidth||0)/12,h2=(r.bbHeight||0)/12,a=w*h2*(r.instanceCount||1);return a>0?a.toFixed(1)+uLabel('sf'):'';}
  if(m==='sf_sheets'){return r.areaSF?Math.ceil(r.areaSF/32)+' <span style="color:#a6adc8;font-size:10px">sht</span>':'';}
  return '';
}
function pn(r){
  var m=r.measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return r.instanceCount||1;
  if(m==='lf')return(r.linearFt||0)*(r.instanceCount||1);
  if(m==='sf'||m==='sf_cy'||m==='sf_sheets')return r.areaSF||(m==='sf_cy'?(r.volumeFt3||0)/27:0);
  return r.volumeFt3||0;
}
function grpTotal(items){
  var tot=0,i,m;
  for(i=0;i<items.length;i++){
    var r=items[i]; m=r.measurementType||'volume';
    if(m==='ea'||m==='ea_bf'||m==='ea_sf')tot+=(r.instanceCount||1);
    else if(m==='lf')tot+=(r.linearFt||0)*(r.instanceCount||1);
    else if(m==='sf'||m==='sf_cy'||m==='sf_sheets')tot+=(r.areaSF||0);
    else tot+=(r.volumeFt3||0);
  }
  if(!items.length)return'';
  m=items[0].measurementType||'volume';
  if(m==='ea'||m==='ea_bf'||m==='ea_sf')return tot+uLabel(m);
  if(m==='lf')return tot.toFixed(1)+uLabel(m);
  if(m==='sf_cy'){
    var cy=0;for(i=0;i<items.length;i++)cy+=(items[i].volumeFt3||0)/27;
    var parts=[];
    if(tot>0)parts.push(tot.toFixed(1)+uLabel(m));
    if(cy>0)parts.push(cy.toFixed(2)+' <span style="color:#a6adc8;font-size:10px">CY</span>');
    return parts.join(' / ')||'--';
  }
  if(m==='sf'||m==='sf_sheets')return tot.toFixed(1)+uLabel(m);
  return tot.toFixed(2)+uLabel(m);
}

  if(v==='__custom__'){var n=prompt('New category name:');if(!n||!n.trim())return;n=n.trim();if(CA.indexOf(n)===-1){CA.push(n);CA.sort();buildBulkDDs();}v=n;}
  var ids=getSelIds();if(!ids.length)return;
  recordUndo(ids,'category',v);
  callJSON('bulkSetCategory',{eids:ids,val:v});
  for(var i=0;i<D.length;i++){if(SEL[D[i].entityId])D[i].category=v;}
  clearSel();filt();
}

function excludeCat(cat){
  var ids=[];for(var i=0;i<D.length;i++){if(D[i].category===cat)ids.push(D[i].entityId);}
  if(!ids.length)return;
  recordUndo(ids,'category','_IGNORE');
  callJSON('bulkSetCategory',{eids:ids,val:'_IGNORE'});
  for(var i=0;i<D.length;i++){if(D[i].category===cat)D[i].category='_IGNORE';}
  filt();
}

/* ═══ RENAME CATEGORY ═══ */
function startCatRename(oldName,el){
  var sp=el;
  var w=sp.offsetWidth,bg=getComputedStyle(sp).backgroundColor,fg=getComputedStyle(sp).color;
  var inp=document.createElement('input');
  inp.type='text';inp.value=oldName;
  inp.style.cssText='font-size:11px;font-weight:600;border:1px solid #89b4fa;border-radius:3px;padding:1px 5px;outline:none;background:'+bg+';color:'+fg+';width:'+Math.max(w,60)+'px;font-family:inherit';
  inp.setAttribute('data-old',oldName);
  sp.parentNode.replaceChild(inp,sp);
  inp.focus();inp.select();
  var done=false;
  function commit(){if(done)return;done=true;var nv=inp.value.trim();if(nv&&nv!==oldName)commitCatRename(oldName,nv);else renderGroups();}
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){e.preventDefault();done=true;renderGroups();}});
}
function commitCatRename(oldName,newName){
  // Update D array
  var ids=[];
  for(var i=0;i<D.length;i++){if(D[i].category===oldName){D[i].category=newName;ids.push(D[i].entityId);}}
  // Update CA list
  var idx=CA.indexOf(oldName);
  if(idx!==-1)CA.splice(idx,1);
  if(CA.indexOf(newName)===-1)CA.push(newName);
  CA.sort();
  // Update openCats key
  if(openCats[oldName]){openCats[newName]=true;delete openCats[oldName];}
  // Update openSubs keys
  var oldPfx=oldName+'|';
  var subKeys=Object.keys(openSubs);
  for(var s=0;s<subKeys.length;s++){if(subKeys[s].indexOf(oldPfx)===0){var tail=subKeys[s].substring(oldPfx.length);openSubs[newName+'|'+tail]=openSubs[subKeys[s]];delete openSubs[subKeys[s]];}}
  // Rebuild dropdowns and re-render
  buildBulkDDs();buildDD();filt();
  // Persist to Ruby
  callJSON('renameCategory',{oldName:oldName,newName:newName,eids:ids});
}

/* ═══ UNDO ═══ */
function getFieldVal(eid,field){for(var i=0;i<D.length;i++){if(String(D[i].entityId)===String(eid))return D[i][field]||'';}return '';}
function recordUndo(ids,field,newVal){
  var ch=[];for(var j=0;j<ids.length;j++){var old=getFieldVal(ids[j],field);if(old!==newVal)ch.push({eid:ids[j],field:field,oldVal:old,newVal:newVal});}
  if(ch.length){UNDO.push(ch);if(UNDO.length>UNDO_MAX)UNDO.shift();updateUndoBtn();}
}
function updateUndoBtn(){var b=document.getElementById('undoBtn');if(b)b.disabled=!UNDO.length;}
function doUndo(){
  if(!UNDO.length)return;
  var ch=UNDO.pop(),needFilt=false,needDD=false;
  for(var c=0;c<ch.length;c++){
    var x=ch[c],eid=x.eid,f=x.field,val=x.oldVal;
    for(var i=0;i<D.length;i++){if(String(D[i].entityId)===String(eid)){D[i][f]=val;break;}}
    if(f==='category'){callJSON('setCategory',{eid:eid,val:val});needFilt=true;}
    else if(f==='costCode')callJSON('setCostCode',{eid:eid,val:val});
    else if(f==='subcategory'){callJSON('setSubcategory',{eid:eid,val:val});needDD=true;}
    else if(f==='sizeNominal')callJSON('setSize',{eid:eid,val:val});
    var row=document.getElementById('r'+eid);
    if(row){
      if(f==='category'){var dd=row.querySelector('select.cs');if(dd)dd.value=val;}
      else if(f==='costCode'){var dd2=row.querySelectorAll('select.cs')[1];if(dd2)dd2.value=val;}
      else if(f==='subcategory'){var inp=row.querySelectorAll('input.sz')[0];if(inp)inp.value=val||'';}
      else if(f==='sizeNominal'){var inp2=row.querySelectorAll('input.sz')[1];if(inp2)inp2.value=val||'';}
      row.style.background='#4a2d2d';(function(r){setTimeout(function(){r.style.background='';},1500);})(row);
    }
  }
  if(needDD)buildDD();
  if(needFilt)filt();
  updateUndoBtn();
}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}});

/* ═══ INLINE EDIT ═══ */
function doSetCat(eid,v){
  if(v==='__custom__'){var n=prompt('New category:');if(!n||!n.trim())return;n=n.trim();if(CA.indexOf(n)===-1){CA.push(n);CA.sort();buildBulkDDs();}v=n;}
  var ids=(SEL[eid]&&getSelIds().length>1)?getSelIds():[String(eid)];
  recordUndo(ids,'category',v);
  if(ids.length>1){callJSON('bulkSetCategory',{eids:ids,val:v});}
  else{callJSON('setCategory',{eid:eid,val:v});}
  for(var i=0;i<D.length;i++){if(ids.length>1?SEL[D[i].entityId]:D[i].entityId==eid)D[i].category=v;}
  for(var j=0;j<ids.length;j++){
    var row=document.getElementById('r'+ids[j]);
    if(row){var dd=row.querySelector('select.cs');if(dd)dd.value=v;
      row.style.background='#2d4a2d';(function(r){setTimeout(function(){r.style.background='';},1500);})(row);}
  }
}
function doSetCC(eid,v){
  var ids=(SEL[eid]&&getSelIds().length>1)?getSelIds():[String(eid)];
  recordUndo(ids,'costCode',v);
  if(ids.length>1){callJSON('bulkSetCostCode',{eids:ids,val:v});}
  else{callJSON('setCostCode',{eid:eid,val:v});}
  for(var i=0;i<D.length;i++){if(ids.length>1?SEL[D[i].entityId]:D[i].entityId==eid)D[i].costCode=v;}
  for(var j=0;j<ids.length;j++){
    var row=document.getElementById('r'+ids[j]);
    if(row){var dd=row.querySelectorAll('select.cs')[1];if(dd)dd.value=v;
      row.style.background='#2d4a2d';(function(r){setTimeout(function(){r.style.background='';},1500);})(row);}
  }
}
function doSetSize(el){var eid=el.getAttribute('data-eid'),v=el.value.trim();recordUndo([eid],'sizeNominal',v);callJSON('setSize',{eid:eid,val:v});for(var i=0;i<D.length;i++){if(D[i].entityId==eid){D[i].sizeNominal=v;break;}}}
function doSetSub(el){
  var eid=el.getAttribute('data-eid'),v=el.value.trim();
  var ids=(SEL[eid]&&getSelIds().length>1)?getSelIds():[String(eid)];
  recordUndo(ids,'subcategory',v);
  for(var k=0;k<ids.length;k++){callJSON('setSubcategory',{eid:ids[k],val:v});}
  for(var i=0;i<D.length;i++){if(ids.length>1?SEL[D[i].entityId]:D[i].entityId==eid)D[i].subcategory=v;}
  for(var j=0;j<ids.length;j++){
    var row=document.getElementById('r'+ids[j]);
    if(row){var inp=row.querySelectorAll('input.sz')[0];if(inp)inp.value=v;
      row.style.background='#2d4a2d';(function(r){setTimeout(function(){r.style.background='';},1500);})(row);}
  }
  buildDD();
}
function setMT(cat,mt){
  for(var i=0;i<D.length;i++){if(D[i].category===cat)D[i].measurementType=mt;}
  callJSON('setMeasurementType',{cat:cat,mt:mt});filt();
}

function scrollToEntity(eid){
  for(var i=0;i<F.length;i++){if(F[i].entityId==eid){openCats[F[i].category]=true;break;}}
  renderGroups();
  var row=document.getElementById('r'+eid);if(!row)return;
  row.scrollIntoView({behavior:'smooth',block:'center'});
  row.style.background='#2d4a2d';setTimeout(function(){row.style.background='';},3000);
}

function X(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function X2(s){return s?String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"):'';}
function T(s,n){return s&&s.length>n?s.substr(0,n)+'...':s||'';}

window.onload=function(){log('init');setTimeout(function(){call('requestData');},200);};
