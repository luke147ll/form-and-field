<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Form and Field</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}

.container{display:flex;flex-direction:column;padding:28px 32px 20px 32px;flex:1}

/* BRANDING */
.brand{text-align:center;margin-bottom:24px}
.brand h1{font-size:22px;font-weight:700;color:#cba6f7;letter-spacing:0.5px}
.brand p{font-size:12px;color:#6c7086;margin-top:4px}
.brand p.scanning{color:#89b4fa;font-weight:600}

/* SOURCE SELECTOR */
.section-label{font-size:11px;font-weight:600;color:#a6adc8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}

.radio-group{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.radio-group label{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #313244;border-radius:6px;background:#181825;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.radio-group label:hover:not(.disabled){border-color:#45475a;background:#1a1a2e}
.radio-group label.active{border-color:#89b4fa;background:#1a1a2e}
.radio-group label.disabled{opacity:0.35;cursor:not-allowed}
.radio-group label .name{font-size:12px;font-weight:500}
.radio-group label .soon{margin-left:auto;font-size:9px;color:#6c7086;background:#313244;padding:2px 8px;border-radius:3px;letter-spacing:0.3px}
.radio-group input[type=radio]{accent-color:#89b4fa;width:14px;height:14px}

/* BUTTONS */
.btns{display:flex;gap:10px;justify-content:flex-end;margin-top:auto}
.btn{padding:8px 20px;border-radius:6px;border:1px solid #45475a;background:#313244;color:#cdd6f4;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:background 0.15s}
.btn:hover{background:#45475a}
.btn.go{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1;font-weight:700;padding:8px 28px}
.btn.go:hover{background:#8cd68c}

/* DIVIDER */
.divider{height:1px;background:#313244;margin:0 -32px 20px -32px}

/* SCANNING STATE */
.scan-state{display:none;flex-direction:column;align-items:center;padding:16px 24px 16px 24px;flex:1}
.scan-state.show{display:flex}
.scan-progress-wrap{width:100%;max-width:380px;height:4px;background:#313244;border-radius:2px;overflow:hidden;margin-top:6px}
.scan-progress-bar{height:100%;width:40%;background:linear-gradient(90deg,#cba6f7,#89b4fa);border-radius:2px;animation:scanSlide 1.5s ease-in-out infinite}
@keyframes scanSlide{0%{margin-left:-40%}100%{margin-left:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.scan-status{font-size:11px;font-weight:600;color:#cdd6f4;margin-top:8px;animation:pulse 1.8s ease-in-out infinite}
.scan-log{flex:1;width:100%;max-width:380px;overflow-y:auto;margin-top:8px;font-family:monospace;font-size:10px;color:#6c7086;max-height:60px}
.scan-log div{padding:1px 0}
</style>
</head>
<body>

<!-- FORM STATE -->
<div class="container" id="formState">
  <div class="brand">
    <h1>Form and Field</h1>
    <p>Construction Takeoff Tool</p>
  </div>

  <div class="divider"></div>

  <div class="section-label">Source Type</div>
  <div class="radio-group">
    <label class="active" onclick="pick(this)">
      <input type="radio" name="src" value="sketchup" checked>
      <span class="name">SketchUp Model</span>
    </label>
    <label class="disabled">
      <input type="radio" name="src" value="ifc" disabled>
      <span class="name">IFC Import</span>
      <span class="soon">Coming Soon</span>
    </label>
    <label class="disabled">
      <input type="radio" name="src" value="revit" disabled>
      <span class="name">Revit (.rvt)</span>
      <span class="soon">Coming Soon</span>
    </label>
  </div>

  <div class="btns">
    <button class="btn" onclick="doCancel()">Cancel</button>
    <button class="btn go" onclick="doScan()">Scan Model</button>
  </div>
</div>

<!-- SCANNING STATE -->
<div class="scan-state" id="scanState">
  <div class="brand">
    <h1>Form and Field</h1>
    <p class="scanning">Scanning Model...</p>
  </div>
  <svg viewBox="0 0 400 170" width="380" height="160" style="display:block;margin:0 auto;">
    <circle cx="45" cy="12" r="1" fill="#6c7086" opacity="0.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="28" r="0.8" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="8" r="1.2" fill="#6c7086" opacity="0.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="20" r="0.7" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="10" r="1" fill="#6c7086" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="45" r="0.6" fill="#6c7086" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="38" r="0.9" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="18" r="0.8" fill="#6c7086" opacity="0.35"><animate attributeName="opacity" values="0.15;0.55;0.15" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="42" r="0.7" fill="#6c7086" opacity="0.25"><animate attributeName="opacity" values="0.1;0.45;0.1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="30" r="1.1" fill="#6c7086" opacity="0.3"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
    <line x1="40" y1="148" x2="360" y2="148" stroke="#313244" stroke-width="1.5"/>
    <g transform="translate(175,105)">
      <rect x="0" y="15" width="50" height="35" fill="#313244" stroke="#6c7086" stroke-width="1" rx="1"/>
      <polygon points="-5,15 25,-5 55,15" fill="#45475a" stroke="#6c7086" stroke-width="1"/>
      <rect x="18" y="30" width="14" height="20" fill="#45475a" stroke="#6c7086" stroke-width="0.8" rx="1"/>
      <circle cx="28" cy="41" r="1.2" fill="#f9e2af"/>
      <rect x="5" y="22" width="10" height="10" fill="#f9e2af" opacity="0.3" stroke="#6c7086" stroke-width="0.8" rx="0.5"/>
      <rect x="35" y="22" width="10" height="10" fill="#f9e2af" opacity="0.3" stroke="#6c7086" stroke-width="0.8" rx="0.5"/>
      <rect x="35" y="-2" width="8" height="14" fill="#45475a" stroke="#6c7086" stroke-width="0.8"/>
    </g>
    <g transform="translate(120,118)">
      <rect x="5" y="20" width="5" height="12" fill="#45475a"/>
      <polygon points="-2,22 7.5,2 17,22" fill="#585b70"/>
      <polygon points="0,16 7.5,-2 15,16" fill="#6c7086"/>
    </g>
    <g transform="translate(280,122)">
      <rect x="4" y="16" width="4" height="10" fill="#45475a"/>
      <polygon points="0,18 6,2 12,18" fill="#585b70"/>
      <polygon points="1,13 6,-1 11,13" fill="#6c7086"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="-60,0;60,0;-60,0" dur="4s" repeatCount="indefinite"/>
      <polygon points="185,52 165,140 235,140 215,52" fill="#a6e3a1" opacity="0.08">
        <animate attributeName="opacity" values="0.04;0.12;0.04" dur="1.5s" repeatCount="indefinite"/>
      </polygon>
      <line x1="185" y1="52" x2="165" y2="140" stroke="#a6e3a1" stroke-width="0.5" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="215" y1="52" x2="235" y2="140" stroke="#a6e3a1" stroke-width="0.5" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="170" y1="80" x2="230" y2="80" stroke="#a6e3a1" stroke-width="1" opacity="0.5">
        <animate attributeName="y1" values="55;135;55" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="55;135;55" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="x1" values="183;168;183" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="x2" values="217;232;217" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </line>
      <g transform="translate(200,35)">
        <ellipse cx="0" cy="-5" rx="12" ry="9" fill="#45475a" stroke="#cba6f7" stroke-width="1"/>
        <ellipse cx="0" cy="2" rx="28" ry="8" fill="#313244" stroke="#cba6f7" stroke-width="1.2"/>
        <circle cx="-18" cy="2" r="2.5" fill="#a6e3a1"><animate attributeName="fill" values="#a6e3a1;#89b4fa;#cba6f7;#a6e3a1" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="-8" cy="5" r="2.5" fill="#89b4fa"><animate attributeName="fill" values="#89b4fa;#cba6f7;#a6e3a1;#89b4fa" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="2" cy="6" r="2.5" fill="#cba6f7"><animate attributeName="fill" values="#cba6f7;#a6e3a1;#89b4fa;#cba6f7" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="12" cy="5" r="2.5" fill="#a6e3a1"><animate attributeName="fill" values="#a6e3a1;#cba6f7;#a6e3a1;#89b4fa" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="20" cy="1" r="2.5" fill="#89b4fa"><animate attributeName="fill" values="#89b4fa;#a6e3a1;#cba6f7;#89b4fa" dur="1.2s" repeatCount="indefinite"/></circle>
        <ellipse cx="0" cy="-6" rx="6" ry="4" fill="#89b4fa" opacity="0.2"/>
      </g>
    </g>
  </svg>
  <div class="scan-progress-wrap"><div class="scan-progress-bar"></div></div>
  <div class="scan-status" id="scanStatus">Scanning Model...</div>
  <div class="scan-log" id="startupLog"></div>
</div>

<script>
function pick(lbl){
  var labels=document.querySelectorAll('.radio-group label:not(.disabled)');
  for(var i=0;i<labels.length;i++) labels[i].className='';
  lbl.className='active';
}
function doScan(){
  document.getElementById('formState').style.display='none';
  document.getElementById('scanState').className='scan-state show';
  if(window.sketchup&&typeof window.sketchup.startScan==='function')
    window.sketchup.startScan();
  else
    window.location='skp:startScan';
}
function doCancel(){
  if(window.sketchup&&typeof window.sketchup.cancel==='function')
    window.sketchup.cancel();
  else
    window.location='skp:cancel';
}
function scanMsg(m){
  var el=document.getElementById('startupLog');
  if(el){
    var d=document.createElement('div');
    d.textContent=m;
    el.appendChild(d);
    el.scrollTop=el.scrollHeight;
  }
  var st=document.getElementById('scanStatus');
  if(st) st.textContent=m;
}
function scanComplete(summary){
  var st=document.getElementById('scanStatus');
  if(st){st.textContent=summary||'Scan complete';st.style.animation='none';st.style.color='#a6e3a1';}
}
</script>
</body>
</html>
